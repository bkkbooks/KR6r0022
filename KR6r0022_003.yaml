body:
  text: 後梁太祖開平元年敕僧尼改屬祠部泉州沙門智宣往西竺求經回詣闕進辟支佛骨貝葉梵經按五代史梁太祖本紀不載按佛祖統紀云云開平三年大明節敕百官詣寺行香祝壽按五代史梁太祖本紀不載按佛祖統紀云云末帝貞明元年東塔院沙門歸序進經論會要詔編入大藏賜演教大師按五代史梁末帝本紀不載按佛祖統紀云云龍德元年春三月丁亥朔禁私度僧尼按五代史梁末帝本紀云云按佛祖統紀元年敕天下毋得私度僧尼願出家者入京城比試經業後唐莊宗同光元年敕設千僧齋按五代史唐莊宗本紀不載按佛祖統紀同光元年誕節敕僧録慧江道士程紫霄入內殿談論設千僧齋同光二年敕僧慧然入內殿咨問禪法按五代史唐莊宗本紀不載按佛祖統紀同光二年敕三聖慧然禪師入內殿咨問禪法上曰朕下大梁收得一顆無價寶珠未有人酬價然曰請陛下寶看上以手舒幞頭角然曰帝王之寶誰敢酬價帝説然亡敕諡廣濟大師通寂之塔同光三年騎將史銀鎗乞出家賜號無學大師按五代史唐莊宗本紀不載按佛祖統紀同光三年騎將史銀鎗有戰功隨駕入洛忽悟禪道乞出家名契澄賜號無學大師以其居為立德院後晉高祖天福四年敕國忌行香飯僧為定式又敕以僧可洪大藏經音義入大藏按五代史晉高祖本紀不載按西溪藂語行香起於後魏及江左齊梁間每然香薰手或以香末散行謂之行香唐初因之文宗朝省奏設齋行香事無經據乃罷宣宗復釋教行其儀朱梁開國大明節百官行香祝壽石晉天福中正固奏國忌行香宰臣跪爐百官立班仍飯僧人即為定式國朝至今因之按佛祖統紀天褔四年敕國忌宰臣百僚詣寺行食飯僧永以為式漢中沙門可洪進大藏經音義四百八十卷敕入大藏出帝開運元年敕為高祖寫大藏經奉安明聖寺以資鴻福按五代史晉出帝本紀不載按佛祖統紀云云後周太祖廣順二年十一月以在京潛龍宅為佛宮賜額天勝禪寺按五代史周太祖本紀不載按續文獻通考云云廣順三年十一月中印土僧法進賜紫衣按五代史周太祖本紀不載按續文獻通考云云世宗顯德元年賜團拍谷佛寺僧紫衣以潛龍宮為皇建禪院以沙門義楚所進釋氏書付史館按五代史周世宗本紀不載按續文獻通考世宗顯德元年四月幸團拍谷佛寺賜主僧紫衣九月以潛龍宮為皇建禪院遣沙門清興居之是月齊州沙門義楚進釋氏六帖三十卷義楚少負名操亦通儒學將佛書麗事以類相從擬白氏儒書所集帝覽而嘉之賜以紫衣其書付史館顯德二年大毀佛寺及佛像禁私度僧尼按五代史周世宗本紀顯德二年夏五月甲戌大毀佛寺禁民親無侍養而為僧尼及私自度者又按周本紀世宗即位之明年廢天下佛寺三千三百三十六是時中國乏錢乃詔悉毀天下銅佛像以鑄錢嘗曰吾聞佛説以身世為妄而以利人為急使其真身尚在苟利於世猶欲割截況此銅像豈有所惜哉由是羣臣皆不敢言按佛祖統紀是歲帝既并省寺院敕男年十五以上誦經百紙或讀五百紙女年十三以上誦經七十紙或讀三百紙陳狀出家本郡考試以聞祠部給牒方得剃度遼太祖以唐天復二年始建開教寺按遼史太祖本紀唐天復二年九月城龍化州於潢河之南始建開教寺太祖六年建天雄寺按遼史太祖本紀六年以兵討兩冶以所獲僧崇文等五十人歸西樓建天雄寺以居之以示天助雄武神册三年五月乙亥詔建佛寺天贊四年十一月丁酉幸安國寺飯僧按以上俱遼史太祖本紀云云太宗天顯十年幸弘福寺為皇后飯僧按遼史太祖本紀天顯十年冬十一月丙午幸弘福寺為皇后飯僧見觀音畫像乃大聖皇帝應天皇后及人皇王所施顧左右曰昔與父母兄弟聚觀於此歲時未幾今我獨來悲歎不已乃自製文題於壁以極追感之意讀者悲之會同五年幸菩薩堂飯僧按遼史太宗本紀會同五年六月丁丑聞皇太后不豫上幸菩薩堂飯僧五萬人穆宗應曆二年冬十二月辛卯以生日飯僧按遼史穆宗本紀云云景宗保寧六年冬十二月戊子以沙門昭敏為三京諸道僧尼都總管加兼侍中保寧八年八月癸卯漢遣使言天清節設無遮會飯僧祝𨤲按以上俱遼史景宗本紀云云聖宗統和二年九月辛未以景宗忌日詔諸道京鎮遣官行香飯僧統和四年秋七月辛巳以殺敵多詔上京開龍寺建佛寺一月飯僧萬人統和七年夏四月己未幸延壽寺飯僧統和九年春正月丙子詔禁私度僧尼統和十年九月癸卯幸五臺山金河寺飯僧統和十二年夏四月戊戌以景宗石像成幸延壽寺飯僧統和十五年冬十月丁酉禁諸山寺毋濫度僧尼開泰元年八月丙申那沙乞賜佛像詔賜護國仁王佛像一開泰四年冬十一月庚申詔汰東京僧開泰九年十二月丁亥禁僧然身煉指太平四年秋七月甲戌諸路奏飯僧尼三十六萬按以上俱遼史聖宗本紀云云興宗重熙八年十一月戊戌召僧論佛法重熙十一年十二月己酉以宣獻皇后忌日上與皇太后素服飯僧於延壽憫忠三學三寺重熙二十三年冬十月癸丑以開泰寺鑄銀佛像曲赦在京囚按以上遼史興宗本紀云云道宗清寧十年秋七月辛巳禁僧尼私詣行在妄述禍福取財物咸雍二年冬十二月戊子僧守志加守司徒咸雍三年冬十一月壬辰夏國遣使進回鶻僧金佛梵覺經咸雍四年春二月癸丑頒行御製華嚴經贊咸雍五年閏十一月己未僧智福加守司徒咸雍六年十二月戊午加圓釋法鈞二僧並守司空咸雍七年八月辛巳置佛骨於招仙浮圖罷獵禁屠殺按以上俱遼史道宗本紀云云咸雍八年飯僧南京中京春泰寧江三州人請受具足戒許之御書華嚴經頌示羣臣又賜高麗佛經按遼史道宗本紀咸雍八年春正月癸未烏古敵烈部詳穩耶律巢等奏克北邊捷以戰多殺人飯僧南京中京三月癸卯有司奏春泰寧江三州三十餘人願為僧尼受具足戒許之秋七月丁未以御書華嚴經五頌出示羣臣冬十二月庚寅賜高麗佛經一藏太康元年三月乙巳命皇太子寫佛書太康四年秋七月甲戌諸路奏飯僧尼三十六萬太康五年秋九月己卯詔諸路毋禁僧徒開壇冬十一月丁丑召沙門守道開壇於內殿太康九年冬十一月甲寅詔僧善知讎校高麗所進佛經頒行之太康十年春正月丙午復建南京奉福寺浮圖大安元年冬十一月己未詔僧尼無故不得赴闕大安九年夏四月乙卯興中府甘露降遣使祠佛飯僧壽隆元年冬十一月甲辰夏國進貝多葉佛經壽隆三年冬十一月戊午以安車召醫巫閭山僧志達壽隆六年十一月丙子召醫巫閭山僧志達設壇於內殿按以上俱遼史道宗本紀云云又按道宗本紀後贊道宗一歲而飯僧三十六萬一日而祝髮三千宋一太祖建隆元年詔以聖誕節晉度行童復諸路寺院及佛像按宋史太祖本紀不載按國朝會要建隆元年詔以二月十六日聖誕為長春節賜百官宴於相國寺是日以慶誕恩詔普度行童八千人按佛祖統紀元年六月詔諸路寺院經顯德二年當廢未毀者聽存其已毀寺所有佛像許移置存留於是人間所藏銅像稍稍得出建隆二年置建隆寺為死於兵者薦冥福又設千僧齋詔誕聖節命僧祝壽按宋史太祖本紀建隆二年春正月戊申以揚州行宮為建隆寺秋八月辛亥幸崇夏寺觀修三門按佛祖統紀二年詔前征李重進凡死於兵者以揚州行宮置建隆寺為薦冥福如唐太宗貞觀四年故事四月上幸相國寺祈雨出內帑設千僧齋已而大雨按續文獻通考二年詔誕聖節京師及天下命僧升座祝壽為準建隆三年詔館西域僧於相國寺又詔試行童通經者給牒高昌國遣僧獻佛牙按宋史太祖本紀不載按佛祖統紀建隆三年西域于闐國沙門善名七人來詔館於相國寺十一月高昌國遣僧法淵獻辟支佛牙按續文獻通考三年詔每歲試行童通蓮經七軸者給祠部牒披剃乾德三年滄州僧道圓以佛舍利貝葉梵經來獻按宋史太祖本紀不載按天竺國傳乾德三年滄州僧道圓自西域還得佛舍利一水晶器貝葉梵經四十夾來獻道圓晉天福中詣西域在塗十二年住五印度凡六年五印度即天竺也還經于闐與其使偕至太祖召問所歷風俗山川道里一一能記按佛祖統紀道圓獻佛舍利貝葉梵經上召見便殿賜紫方袍器幣乾德四年賜僧行勤等一百五十七人錢各三萬至西域求佛書召僧崇蘊入內講金剛經又敕莊嚴佛像以李藹毀釋教敕流沙門島按宋史太祖本紀乾德四年春三月癸未僧行勤等一百五十七人各賜錢三萬遊西域按天竺國傳四年僧行勤等一百五十七人詣闕上言願至西域求佛書許之以其所歷甘沙伊肅等州焉耆龜茲于闐割祿等國又歷布路沙加濕彌羅等國並詔諭其國令人引導之按佛祖統紀四年上初詔西川轉運使沈義倫於益州以金銀字寫金剛經進上至是召天清寺沙門崇蘊入內講演敕內侍張重進往峨眉山普賢寺莊嚴佛像因嘉州屢奏白水寺普賢相見也河南府進士李藹造滅邪集以毀釋教竊藏經以為衾事聞上以為非毀聖道誑惑百姓敕刺流沙門島乾德五年禁毀佛像敕沙門文勝編修大藏經按宋史太祖本紀乾德五年七月丁酉禁毀銅佛像按佛祖統紀五年詔曰禁錮以來天下多輦佛像赴京顧惟像教世許尊瞻忽從鎔毀甚乖歸敬應諸郡銅像依舊存留但不許鑄造新像右街應制沙門文勝奉敕編修大藏經隨函索隱凡六百六十卷開寶二年長春節詔天下沙門殿試經律論義十條全中者賜紫衣按宋史太祖本紀不載按佛祖統紀云云開寶三年幸開寶寺觀新鐘詔成都造佛經按宋史太祖本紀開寶三年九月己酉幸開寶寺觀新鐘按續文獻通考開寶三年詔成都造金銀佛經各一藏開寶四年詔館梵僧於相國寺敕雕大藏經板按宋史太祖本紀不載按佛祖統紀開寶四年沙門建盛自西竺還詣闕進貝葉梵經同梵僧曼殊室利偕來室利者中天竺王子也詔館於相國寺持律甚精都人施財盈屋並無用敕高品張從信往益州雕大藏經板開寶五年禁鐵鑄浮屠及佛像詔僧入大內誦藏經又詔於尼寺置壇受戒又詔禁道場夜集士女賜天竺沙門紫服金幣按宋史太祖本紀開寶五年春正月壬辰朔禁鐵鑄浮屠及佛像按佛祖統紀五年詔京城名德元超等入大內誦金字大藏經車駕臨幸並賜紫方袍又詔曰僧尼無間實紊教法自今於尼寺置壇受戒尼大德主之又詔曰釋門之本貴在清虗梵剎之中豈宜汙雜適當崇闡尤在精嚴如聞道場齋會夜集士女深為褻瀆無益修持宜令功德司祠部告諭諸路並加禁止西天竺沙門可智法見真理三人來朝賜紫方袍西天竺沙門蘇葛陀來貢舍利文殊華賜紫服金幣西天竺沙門彌羅等十四人來朝並賜紫服開寶六年幸相國寺限諸州僧及百人歲許度一人詔天竺僧赴闕賜紫方袍按宋史太祖本紀開寶六年三月丙子幸相國寺觀新修塔十二月限度僧法諸州僧帳及百人歲許度一人按佛祖統紀六年知鄜州王龜從表稱中天竺三藏法天至譯聖無量壽經七佛讚河中府梵學沙門法進執筆綴文龜從潤色詔法天赴闕召見慰問賜紫方袍按歸田録太祖皇帝初幸相國寺至佛像前燒香問當拜與不拜儈録贊寧奏曰不拜問其何故對曰現在佛不拜過去佛贊寧者頗知書有口辨其語雖類俳優然適會上意故微笑而頷之遂以為定制至今行幸焚香皆不拜也議者以為得禮開寶八年臨幸佛寺禮無畏三藏塔手書金剛經讀誦按宋史太祖本紀開寶八年冬十一月臨視新龍興寺按佛祖統紀八年三月上幸洛陽至龍門山廣化寺開無畏三藏塔瞻敬真體四月上將郊天而雨不止遣