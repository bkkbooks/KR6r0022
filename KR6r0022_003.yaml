不載按燕翼貽謀録李主侫佛度人為僧不可數計太祖既下江南重行沙汰其數尚多太宗乃為之禁至道元年六月己丑詔江南兩浙福建等處諸州僧三百人歲度一人尼百人歲度一人按佛祖統紀至道元年中天竺沙門迦羅扇帝來朝進佛頂舍利貝葉梵經詔度僧尼誦經百紙讀經五百紙為合格又詔兩街僧録省才進盂蘭盆儀至道二年詔以御製祕藏詮二十卷緣識五卷逍遙詠十卷命兩街箋注入大藏頒行敕史館編修贊寧知西京教門寺至道三年九月西天竺沙門羅護羅來朝進貝葉梵經賜紫服按以上宋史太宗本紀俱不載按佛祖統紀云云真宗咸平元年御製聖教序令置先帝聖教序後賜天竺沙門紫衣以贊寧充右街僧録按宋史真宗本紀不載按佛祖統紀咸平元年御製三藏聖教序賜明教大師法賢等令置先帝聖教序後沙門可升注序進上詔知制誥朱昂兼譯經潤文官中天竺沙門你尾抳等來朝進佛舍利梵經菩提樹葉菩提子數珠賜紫衣西天竺沙門佛護來朝進梵經賜紫衣敕史館編修贊寧充右街僧録咸平二年以聖教序賜傳法院陳恕請罷譯經院不許敕贊寧遷左街僧録按宋史真宗本紀咸平二年七月壬寅製聖教序賜傳法院按佛祖統紀咸平二年禮部侍郎陳恕言譯經院久費供億乞罷之上以先朝盛典不許敕史館編修贊寧遷左街僧録咸平三年八月試光祿卿天息災亡諡慧辨法師敕有司具禮送終咸平四年五月試鴻臚卿法賢亡諡元覺法師敕送終如慧辨禮按以上宋史真宗本紀俱不載按佛祖統紀云云咸平六年詔擇僧可者始令往西天取經又詔隋僧智者科教類次刊牘賜名天台總録按宋史真宗本紀不載按佛祖統紀咸平六年知開封府陳恕言僧徒往西天取經者臣嘗召問皆罕習經業而資狀庸陋或往諸藩必招輕慢自今宜試經業察人材擇其可者令往詔可二月詔隋智者禪師科教類次刊牘凡百五十四部賜名天台總録譯館請繫開元東土集傳制曰可景德元年賜諸國沙門紫服以旱召西天梵僧作呪法詔楊億裁定傳燈録頒行按宋史真宗本紀不載按佛祖統紀景德元年日本國沙門寂照來進無量壽佛像金字法華經水晶數珠賜紫方袍西天三藏法護來進佛舍利貝葉梵經賜紫衣束帛館於譯經院北天沙門戒賢來進梵經賜紫服七月亢旱召西天梵僧於金明池水心立壇呪龍有雲霧自池中出須臾雨至自後歲旱必作呪法多驗東吳沙門道原進禪宗傳燈録三十卷詔翰林學士楊億裁定頒行景德二年幸傳法院觀新譯經召僧見便殿閲試行業按宋史真宗本紀景德二年九月庚午幸興國寺傳法院觀新譯經按佛祖統紀二年三月迦濕彌羅國沙門日羅失稽來進梵經菩提樹葉七月西天沙門達摩波來進梵經賜紫服九月上幸譯經院令三藏諸僧坐賜香茶繒綵有差上以諸寺住持先是僧職遷補或非其才至是召見便殿閲試行業景德三年孫奏請減損修寺度僧不許按宋史真宗本紀不載按佛祖統紀景德三年諸王府侍讀孫奏請減損修寺度僧上曰釋道二門有助世教人或偏見往往毀訾縱使僧道時有不檢安可即廢景德四年賜交州佛氏書臣僚請禁教不聽按宋史真宗本紀景德四年秋七月乙亥交州來貢賜佛氏書按佛祖統紀四年臣僚言愚民無知侫佛過度謂捨財可以邀福修供可以滅罪蠧國害政宜加禁止上謂宰臣曰佛教使人遷善誠有其益安可禁之且佛法所至甚廣雖荒服諸國皆知信奉唯道教中原有之然不甚盛王旦對曰頃歲虜使登開寶塔瞻禮甚虔誓當戒殺及至上清宮不復屈膝是知四夷唯重佛而不敬道也上曰然詔遣使送金襴袈裟往惠州羅浮山中閣寺奉釋迦瑞像仍為國建祈福道場感五色祥禽集於齋所景德年始令宰相率內職赴佛寺行香按宋史真宗本紀不載按王文正筆録舊制國忌迭命宰相參知政事一員率文武常參官赴佛寺行香內職不預焉景德中同樞密院事王公欽若陳公堯叟率內職同赴乃聽自今大忌樞密使內職學士內諸司使軍職下洎列校同為一班先詣西上閣門進名奉慰宰相參知政事文武百官為一班次詣閣門進名奉慰訖退齊赴佛寺行香小忌則否大中祥符二年禁毀金寶塑浮屠像敕僧惟淨試光祿卿同預譯經賜吳國大長公主號報慈正覺大師按宋史真宗本紀大中祥符二年二月癸丑禁毀金寶塑浮屠像按佛祖統紀二年升州崇勝寺賜名承天立甘露戒壇敕光梵大師惟淨試光祿卿同預譯經九月吳國大長公主出家法名清裕賜號報慈正覺大師即太宗第七女幼不茹葷血上幸延聖寺抱對佛願舍為尼至是乞落髮詔建資聖院以居之敕釋門威儀教坊樂部以為迎導時密王女曹王女及後宮三十人餘皆隨出家詔於是日普度天下童子十人度一人又詔於洛陽甲馬營太祖誕聖之地建應天寺以奉神御大中祥符三年詔天下諸路皆立戒壇禁官民毀辱僧尼詔出經論題目考試沙門館僧雲豁於北御園西天中天竺沙門來朝按宋史真宗本紀不載按佛祖統紀大中祥符三年詔京師太平興國寺立奉先甘露戒壇天下諸路皆立戒壇凡七十二所京師慈孝寺別立大乘戒壇敕品官無故毀辱僧尼口稱禿字者勒停見任庶民流千里詔知制誥李維出經論題目考試沙門以為遷補左右街之序左街相國寺右街開寶寺又詔吉州西峯雲豁禪師館於北御園入定月餘求歸故山詔許之師每入定或經歲方出西天沙門衆德來朝進舍利梵經菩提印中天竺沙門覺稱法戒來朝進舍利梵夾金剛座真容菩提樹葉召見便殿慰勞甚厚館於譯經院稱進讚聖頌詔惟淨譯之稱謂學士楊億曰入此國見屠殺豬羊市肆懸內痛不忍觀西竺食肉五辛者驅出城故無貨者心不欲久居此願至五臺禮文殊即還本土晉公丁謂問之曰數萬里遠來更何所為稱曰并欲禮宣律師塔耳及還詔賜金襴袈裟奉安金剛座及賜裝錢茶果大中祥符四年幸廣化諸寺瞻無畏塔及摩騰真身詔修普賢寺設三萬僧齋歲度僧四人又詔守堅道者入見令宮女皆出焚香賜般尼國沙門紫服按宋史真宗本紀不載按佛祖統紀大中祥符四年三月上幸洛陽龍門山廣化寺瞻無畏三藏塔製讚刻石置之塔所復幸白馬寺瞻摩騰三藏真身上謂近臣曰摩騰至今千年而全身不壞良可尊敬宜嚴諭寺僧用心守護因御製以褒之詔賜黃金三千兩增修峨嵋山普賢寺設三萬僧齋歲度僧四人又詔漣水軍守堅道者入見令宮女皆出焚香每一女至前上給之曰后也師皆言非如是數十人師忽起曰陛下好養此人他日必作家主即章獻太后也師乞歸山詔許之在山常紙衣閉戶不見人有置食庭前者人退自取之五月般尼國沙門寂賢來進梵經菩提印賜紫服十一月益州守臣李士衡進大慈寺沙門仁贊編修釋氏會要四十卷大中祥符五年詔沙門茂貞入見又詔日本國建寺賜額神光按宋史真宗本紀不載按佛祖統紀大中祥符五年二月詔嘉州峨眉山沙門茂貞入見上賜以詩館於景德寺舒王元稱夢青衣童持書以授中使足蹈黃雲隱隱而沒王以問師答曰將有儲嗣降孕之慶未幾仁宗生日本國遣使稱貢言國東有祥光見舊傳中原天子聖明則應此瑞上喜詔日本建寺賜額神光敕詞臣為撰寺記大中祥符六年詔試童行經業方許剃度賜開寶寺塔號又賜編修大藏經録名大中祥符法寶録西天竺沙門來賜紫服召僧崇矩入內殿講經按宋史真宗本紀不載按佛祖統紀大中祥符六年二月詔天下官吏試童行經業方許剃度五月開寶寺福勝塔有金色光見相輪上又有聖僧繞塔翌日得五色舍利上親幸敬觀見舍利於塔表大如月色同水晶往來飛動於鈴索之上士庶同瞻於地甎上護舍利五千餘粒詔賜號靈感之塔時京師天清寺興慈塔亦有舍利見相輪上上曰像教嘉祥生民之福也八月兵部侍郎譯經潤文官趙安仁奉詔編修大藏經録成凡二十一卷賜名大中祥符法寶録仍賜御製序云自太平興國以來凡譯成經律論四百十三卷祕書監楊億光梵大師惟淨等編次又請以兩朝御製佛乘文集編入大藏下詔褒許諡泗州僧伽大士普照明覺大師公私不得指斥其名九月西天竺沙門知賢等來進舍利梵經賜紫服十一月西天波羅奈沙門滿賢進梵經無憂樹葉浮石崇矩法師至京師上聞其名召入內殿講四十二章經盛談名理上心大悅賜紫服金幣香藥大中祥符八年詔以太宗御製妙覺集編入大藏南海注輦國遣使進天竺梵經按宋史真宗本紀不載按佛祖統紀大中祥符八年敕汀州南安巖名均慶院賜太宗御書百二十軸詔以太宗御製妙覺五卷付傳法院編入大藏南海注輦國遣使來貢進天竺梵經其使言四十年以來海無風濤意中國有聖人出世大中祥符九年天竺諸國沙門來進舍利梵經敕修龍門山石龕佛詔沙門智悟祈雨按宋史真宗本紀不載按佛祖統紀大中祥符九年二月北天竺優填曩國沙門天覺南天竺師子國沙門妙德西天竺迦蹉國沙門等來各進舍利梵經各賜紫衣金幣四月中天竺薩縛羅國沙門童壽來進梵經賜紫服五月東天竺縛鄰捺國沙門普積來進梵經賜紫服西京龍門山石龕佛歲久廢壞上命沙門栖演給工修篩凡一萬七千三百三十九尊九月不雨詔泗州龜山沙門智悟入京止開寶寺祈雨悟先在泗州祈雨有感曾斷一臂至是又曰若七日得雨更舍一臂五日大雨乃截一臂上遣使賜藥悟曰無害人見所截臂無血甚異之泗守與郡人皆夢僧伽謂之曰悟是五百羅漢中一來此救世天禧元年詔新譯頻那夜迦經不許入藏賜台州東掖山智者教文印本四千餘卷按宋史真宗本紀不載按佛祖統紀天禧元年四月詔曰金仙垂教實利含生貝葉膽文當資傳譯苟師承之或異必邪正以相參既失精詳浸成訛謬而況葷血之祀甚瀆於真乘厭詛之辭尤乖於妙理其新譯頻那夜迦經四卷不許入藏自今以後似此經文不得翻譯七月詔賜台州東掖山智者教文印本四千六百二十卷住山本如觀郡人建教藏閣以奉之天禧三年詔以御注佛經入藏頒行又詔賜女真國大藏經按宋史真宗本紀不載按佛祖統紀天禧三年譯經三藏法護等請以御注四十二章經御注遺教經入藏頒行詔可十一月東女真國入貢乞賜大藏經詔給興之天禧四年詔以御製釋典法音集附大藏賜西天竺沙門紫服又特賜僧知禮號法智按宋史真宗本紀不載按佛祖統紀天禧四年正月右街講經祕演等請以御製釋典法音集命僧箋注凡三十卷乞附大藏詔可初是楊億提舉其事集中有六種震動之語一僧箋之將三百字暗碎不可觀億削去自注云地體本靜動必有變人服其簡西天竺沙門普善來進梵經賜紫服附馬都尉李遵最奏四明知禮法師高行遺身上嘉歎不已特賜法智之號仍宣旨住世演教不許遺身時譯經院證義簡長等二十三人各寄聲詩贊美道德天禧五年詔遣內侍請僧法智領衆修法華懺又詔建資聖禪院為將士戰亡者追福按宋史真宗本紀不載按佛祖統紀天禧五年詔遣內侍俞源清往四明延慶請法智法師領衆修法華懺為國祈福師為述修懺要旨上之詔於并州建資聖禪院為將士戰亡者追福門下侍郎平章事丁謂兼譯經潤文使翰林學士朝迥李維兼潤文官是歲天下僧數三十九萬七千六百十五人尼六萬一千二百四十人乾興元年仁宗即位章懿太后遣使請僧遵式為國行懺賜龜茲國僧紫服按宋史仁宗本紀乾興元年二月戊午即位按佛祖統紀乾興元年章懿太后遣使詣錢唐天竺請遵式法師為國行懺師著金光明護國道場儀上之因奏天台教卷乞入大藏龜茲國僧華嚴來進佛骨舍利梵經賜紫服
