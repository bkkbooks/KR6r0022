  text: 古今圖書集成釋教部彚考目次卷第一周秦漢後漢魏吳晉宋齊梁陳北魏卷第二北齊隋唐卷第三後梁後唐後晉後周遼宋一卷第四宋二金卷第五元卷第六明皇清卷第七佛國記鄯善國𠌥夷國于闐國子合國竭叉國陀歷國烏萇國弗樓沙國那竭國羅夷國䟦那國毗茶國摩頭羅國拘薩羅國摩竭提國師子國續博物志釋氏之源野客蒙談佛入中國墨池浪語佛法入中國古今圖書集成釋教部彚考目次終
