body:
  text: 宋二仁宗天聖元年敕內侍降香入天竺靈山為國祈福南海駐輦國進金葉天竺梵經按宋史仁宗本紀不載按佛祖統紀天聖元年敕內侍楊懷古降香入天竺靈山為國祈福慈雲式法師復以天台教文入藏為請懷古為奏上知南海駐輦國遣使進金葉天竺梵經詔三藏法護譯之天聖二年詔賜天台教文入藏及賜白金百兩飯靈山千衆西天沙門愛賢護賢來進貝葉梵經詔賜紫服按宋史仁宗本紀不載按佛祖統紀云云天聖三年夏竦等進新譯經音義七十卷詔不許收度曾犯真刑及文身者按宋史仁宗本紀不載按佛祖統紀天聖三年翰林學士夏竦同三藏惟淨等進新譯經音義七十卷判都省馬亮言佛道貴重人天所師請無得收度曾犯真刑及文身者詔從之天聖五年西域僧獻梵書惟淨進大藏經目録賜名天聖釋教録按宋史仁宗本紀天聖五年二月丁丑西域僧法吉祥等來獻梵書按佛祖統紀五年三藏惟淨進大藏經目録二裘賜名天聖釋教録凡六千一百九十七卷天聖六年罷兩川歲貢織佛御製三寶讚按宋史仁宗本紀天聖六年春正月己酉罷兩川乾元節歲貢織佛按佛祖統紀天聖六年御製三寶讚以賜宰輔及譯經院天聖七年敕建慈化寺為先帝薦福按宋史仁宗本紀不載按佛祖統紀天聖七年敕於京師大建慈化寺謂宰臣曰此蓋為先帝薦福之舉今後毋得無故擅興力役天聖九年敕迎六祖衣鉢奉安大內清淨堂詔僧懷問往西天建塔迎開寶寺佛牙置禁中尋奉還寺按宋史仁宗本紀不載按佛祖統紀天聖九年敕韶州守臣詣寶林山南華寺迎六祖衣鉢入京闕供養及至奉安大內清淨堂敕兵部侍郎晏殊撰六祖衣鉢記傳法院言沙門懷問嘗往天竺為真宗皇帝建塔於佛金剛座之側今欲再往為皇太后今上更建二塔乞賜先朝聖教序皇太后發願文聖上三寶讚刊石塔下及製袈裟奉釋迦像詔可仍令詞臣撰沙門懷問三往西天記初太祖疑宣律師佛牙非真遣使取自洛烈火煅之色不變心敬神異遂製發願文太宗朝復取驗以火製偈讚以申敬因奉安大相國寺法華院真宗嘗迎供開寶寺靈感塔下瞻拜之夕神光洞發遂製偈讚上以三朝敬事遂迎置禁中以薔薇水灌之忽於穴中得舍利一五色映人因為製讚以金䀃二重藏之奉以還寺景祐元年毀天下無額寺院賜趙元昊佛經詔試童行誦法華經中選者始得度按宋史仁宗本紀景祐元年閏六月乙亥毀天下無額寺院十二月癸酉賜西平王趙元昊佛經按佛祖統紀景祐元年詔試天下童行誦法華經中選者得度命參政宋綬夏竦同監試有童行誦經不過問習業幾年對曰十年矣二公笑且閔之約歸各取經誦綬十日竦七日不遺一字是歲天下僧三十八萬五千五百二十人尼四萬八千七百四十人寶元二年僧懷問等自中天竺還召見慰勞賜號及紫衣金幣按宋史仁宗本紀不載按佛祖統紀寶元二年五月三往西天懷問同沙門得濟永定得安自中天竺摩竭陀國還進佛骨舍利貝葉梵經貝多子菩提樹葉無憂樹葉菩提子念珠西天十九本召見慰勞賜號顯教大師紫衣金幣慶曆元年僧惟淨中丞孔輔道請罷譯經不許按宋史仁宗本紀不載按佛祖統紀慶曆元年三藏法師惟淨言西土進經新舊萬軸鴻臚之設有費廩祿欲乞停罷譯經上曰三聖舊謨焉敢即廢且琛貢之籍非鴻臚則不可識未幾中丞孔輔道上疏請罷譯經上出淨疏示之諭以先朝盛典不可輒廢慶曆二年賜僧本如號及紫方袍又賜白蓮社額按宋史仁宗本紀不載按佛祖統紀慶曆二年初東掖山本如法師結百僧修法華長懺一年是年七月駙馬都慰李遵助以聞於朝賜號神照紫方袍嘗於山西南見一虎臥以杖擊之曰非汝住處也虎俯首而去後於虎臥處結屋為庵以是年歸間此中慕廬山之風與郇公章得象諸賢結白蓮社六七年間䆮成巨剎主上素聞道風因賜白蓮之額慶曆三年詔迎佛牙入內殿禱雨作金殿奉藏按宋史仁宗本紀不載按佛祖統紀慶曆三年六月久旱詔迎相國寺佛牙入內殿躬禱須臾雨大注乃作金殿四門以象天宮用以奉藏復製發願文以見歸敬宰相章得象兼譯經潤文使按學佛考訓三年詔迎佛牙於禁中禱雨以海上薔薇水灌之得舍利一顆貯琉璃瓶中七寶嚴飾藉以白㲲覆以瓔珞龍鳳衣供奉踰月慶曆四年靈感塔災敕取塔基舍利入內供養按宋史仁宗本紀不載按佛祖統紀慶曆四年六月開寶寺靈感塔災敕中使取塔基所藏舍利多入內供養將事再建諫臣余靖力諫上不説慶曆七年詔封紫服神僧為慈忍寧濟大師御製譯經頌賜僧法護按宋史仁宗本紀不載按佛祖統紀慶曆七年春不雨遣使往隨州大洪山祈雨使人晨興叩殿遇紫服神僧以目視之翌日大雨詔封慈忍寧濟大師御製譯經頌賜三藏法護慶曆八年詔請僧法華於化成殿齋按宋史仁宗本紀不載按佛祖統紀諫臣司馬光屢疏乞立儲嗣上聞開寶寺法華有異行夜焚香默祝翌日請法華大士於化成殿齋暨旦上道衣凝佇俄內侍奏言法華自右掖門趨入將至寢殿訶不能止上笑曰朕召之耳至則徑升御榻趺坐受齋上問儲嗣事索紙連書十三十三字後英宗繼統乃濮王第十三子皇祐元年詔再建靈感塔敕中使往陳留八關寺迎佛指舍利按宋史仁宗本紀不載按佛祖統紀皇祐元年詔再建靈感塔奉藏舍利敕中使往陳留八關寺迎佛指舍利或以為偽上命試以烈火擊以金椎了無所損俄而舍利流迸光照西方上曰功德欲歸闡教乎乃以水晶寶匣盛之御製發願文奉迎歸寺初是陳留邑人為沙門義津建寺請額為闡教俄有梵僧至曰我自天竺擕佛指舍利欲求吉祥處奉安非師不能護施之而去既而瑞光屢發祈禱頻應皇祐二年以宰相文彥博兼譯經潤文使詔僧懷璉等入對化成殿賜舜老夫依舊為僧按宋史仁宗本紀不載按佛祖統紀皇祐二年宰相文彥博兼譯經潤文使彥博在京師與淨嚴禪師結僧俗十萬人念佛為往生淨土之願詔左街淨因禪寺懷璉禪師入對化成殿升座右街僧録智林等問話奏對稱旨賜號大覺初舜老夫住廬山棲賢南康守以私忿民其衣大覺迎至淨因居以正室上每召師入內未嘗言之一日嘉王至寺見大覺侍立舜旁甚恭怪問左右知大覺曾入舜室歸以奏上上召對便殿道貌奇偉敬之曰山林之高人也即於扇上書賜曉舜依舊為僧再住棲賢寺賜紫衣銀鉢皇祐五年西天沙門智吉祥等來朝進梵經各賜紫服按宋史仁宗本紀不載按佛祖統紀云云至和元年敕賜諸僧號按宋史仁宗本紀不載按佛祖統紀至和元年敕三藏法護戒德高勝可特賜六字師號曰普明慈覺傳梵大師上夢至景德寺門見龍蟠地上驚而寤遣使往視之見一僧臥門外其名道隆明日召見奏對詳敏賜號明悟禪師敕曹門外建華嚴院以居之嘉祐元年乾元節敕開寶寺福勝塔院建大齋施僧袈裟按宋史仁宗本紀不載按佛祖統紀云云嘉祐三年西夏國奏國內新建伽藍乞賜大藏經典詔許之按宋史仁宗本紀不載按佛祖統紀云云年以歲度僧太多始三分減一按宋史仁宗本紀不載按張洞傳洞判祠部時天下戶口日蕃民去為僧者衆洞奏至和元年敕增歲度僧舊敕諸路三百人度一人後率百人度一人又文武官內臣墳墓得置寺撥放近歲滋廣若以勳勞宜假之者當依古給戶守冢禁勿樵採而已今祠部帳至三十餘萬僧失不裁損後不勝其幣朝廷用其言始三分減一英宗治平四年神宗即位給陝西轉運司度僧牒令糴穀賑旱賜天下寺院額按宋史神宗本紀治平四年正月帝即位冬十月庚戌給陝西轉運司度僧牒令糴穀賑霜旱州縣按佛祖統紀四年敕天下私造寺院及三十間者並賜壽聖之額神宗熙寧元年始鬻僧度牒按宋史神宗本紀不載按佛祖統紀熙寧元年七月司諫錢公輔言祠部遇歲飢河決乞鬻度牒以佐一時之急自今聖節恩賜並與裁損鬻牒自此始是歲天下僧二十二萬六百六十人尼三萬四千三十人熙寧三年夏四月丁卯給兩浙轉運司度僧牒募民入粟按宋史神宗本紀云云熙寧五年敕錢唐天竺觀音院歲度一僧以奉香火按宋史神宗本紀不載按佛祖統紀云云熙寧七年八月丁丑賜環慶安撫司度僧牒以募粟振漢蕃飢民按宋史神宗本紀云云元豐三年敕設千僧齋改賜譯經僧試少卿者為三藏法師按宋史神宗本紀不載按佛祖統紀元豐三年正月敕大內設千僧齋施袈裟金剛經為慈聖太后追福詳定官制朝儀以自唐至本朝譯經僧官皆授試光祿卿或鴻臚卿今後改賜譯經三藏法師試少卿者賜三藏法師革江州東林律院為禪席命常總禪師居之元豐五年詔僧宗本入對延和殿按宋史神宗本紀不載按佛祖統紀元豐五年詔相國寺闢六十四院為八禪二律以東西序為慧林智海二巨剎詔淨慈宗本禪師住慧林東林常總禪師住智海總固辭許之本入對延和殿山呼即就榻加趺侍衛驚顧師方自若賜茶舉盞撼蕩之上問受業對曰承天永安上大喜語論久之既退上目之曰僧中寶也侍者問主上何語曰吃茶間話耳按可談元豐間詔僧慈本住慧林禪院召見賜茶以為榮遇先公侍上見宣諭慈本上云京師繁盛細民逐末朕要卿來勸人作善別無他語元豐七年王安石請以江寧府園廬為僧寺賜額報本禪院按宋史神宗本紀不載按佛祖統紀云云按熙豐日曆王安石劄子奏幸遇聖運超拔等夷知獎眷憐逮兼父子戴天負地感涕難勝𮨇迫衰殘糜損何補不勝螻蟻微願臣今所居江寧府上元縣園屋為僧寺一所永遠祝延聖壽如蒙矜許特賜名額廣昭希曠榮遇一時仰憑威神誓報無已取進止奉聖旨依所乞以報本禪寺為名額元豐八年皇太子手寫佛書為帝祈福按宋史哲宗本紀元豐八年二月神宗寢疾宰相王圭乞早建儲為宗廟社稷計又奏請皇太后權同聽政神宗首肯三月甲午朔皇太后垂簾於福寧殿諭圭等曰皇子性莊重從學頴悟自皇帝服藥手寫佛書為帝祈福因出以示圭等所書字極端謹圭等稱賀遂奉制立為皇太子哲宗元祐元年高麗僧義天來朝按宋史哲宗本紀不載按佛祖統紀元祐元年高麗王子祐世僧統義天來朝敕禮部蘇軾館伴有司供帳甚設義天四上表乞傳華嚴教乃敕主客楊傑送至錢唐受法於慧因淨源法師復往天竺謁慈辨諫法師傳天台教見靈芝照律師請戒法及資持記至金山謁佛印元禪師坐納其禮楊傑驚問其故元師曰義天異域僧耳若屈道徇俗何以示華夏師法朝廷聞之以師為知大體義天既還國乃建剎傳教奉慈辨為始祖復寄金書華嚴經新舊三譯於慧因建閣以藏元祐三年敕內侍齎黃金往東林妝飾神運五殿佛像按宋史哲宗本紀不載按佛祖統紀云云元祐五年詔賜僧升號曰神智按宋史哲宗本紀不載按佛祖統紀元祐五年神智升法師來居越之興福時趙清戲公抃為師適亢旱大疫久禱不應遂請師迎大士入府治懇禱一夕雨如霔疫病亦息抃奏於朝賜所居曰圓通錫師號曰神智元祐七年詔賜佛陀波利塔院額按宋史哲宗本紀不載按佛祖統紀元祐七年潁川守臣蘇軾言佛陀波利塔院祈禱屢驗乞降敕額詔賜光梵之院波利在唐儀鳳初復回西竺取尊勝呪經再來譯傳後至潁而亡里人漆其身造塔以嚴事之紹聖元年召僧於禁中為宣仁作小祥道場按宋史哲宗本紀不載按道山清話紹聖改元九月禁中為宣仁作小祥道場宣隆報長老升座上設御幄於旁以聽其僧祝曰伏願皇帝陛下愛國如身視民如子每念太皇之保佑常如先帝之憂勤庶尹百僚謹守漢家之法度四方萬里永為趙氏之封疆既而有僧問話云太皇今