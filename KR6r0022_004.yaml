帝於禁中書佛經披讀詔建觀音殿按宋史高宗本紀不載按佛祖統紀紹興二年正月上駐蹕於錢唐升為臨安府上每於禁中書金剛圓覺普門品心經七佛偈暇日常自披讀以發聖解又御書阿育王山舍利塔曰佛頂光明之塔二月詔再建天竺觀音大士殿紹興三年詔僧居道上按宋史高宗本紀不載按佛祖統紀紹興三年二月廬山道法師申劄都省稱崇觀之後道士叨冒資品林靈素王沖道輩視兩府者甚衆遂令道士冒居僧上靖康建炎道士視官已行追毀而國忌行香寺院聚會猶敢傲然居上其蔑視國法有若此者今欲復還祖宗舊制僧史略具載每當朝集僧先道後並立殿廷僧東道西凡遇郊天道左僧右尋送禮部取到太常寺狀稱因革禮乾德元年宣德門肆赦故事道左僧右又檢照嘉祐編敕并紹興新書並以僧道立文為次其政和條內道僧觀僧及道士位在僧上並已刪去不行尋蒙朝旨依條改正以僧居上十一月太常寺遍符諸路應行香立班諸處聚會並依祖宗成法以僧居左紹興四年敕建水陸大齋濟度戰沒之人按宋史高宗本紀不載按佛祖統紀紹興四年偽齊劉豫同金虜入寇上下詔親征九月上親詣天竺大士殿焚香恭禱早平北虜既而淮東宣撫使韓世忠敗金人齊人於承州世忠獻俘行在因陳戰沒之人乞加贈恤上蹙然曰死於鋒鏑誠為可憫即敕直學士院胡松年具詞建水陸大齋以為濟度是夕也有見鬼神來會甚衆有夢戰死者咸欣然相慶以為自此得生善趣者上聞之大説紹興五年詔道法師入內祈雨賜金鉢又賜僧應如度牒銀幣按宋史高宗本紀不載按佛祖統紀紹興五年彌月大旱詔道法師入內祈雨結壇作法以四金瓶各盛鮮鯽噀水默祝遣四急足投諸江使未回而雨已洽上大悅特賜金鉢九月上幸天竺大士殿炷香住山應如奏對如流上悅賜萬歲香山以供大士及度牒銀幣之類紹興七年詔有額寺院充墳寺功德者並令改正按宋史高宗本紀不載按佛祖統紀紹興七年左司諫陳公輔上疏乞照祖宗成法不許執政指射有額寺院應臣僚前曾陳乞有額寺院充墳寺功德者並令改正許與無額小院詔可初是知院李綱占常州普利及邵武興聖臺臣論奏以兩處俱為有額有所違礙詔令別占無額小院士論為快又樞密沈與求奏稱墳寺妙嚴院雖本家建造既元有敕額不當撥賜上以為自造之屋不必改正時諫臣謂與求能體祖宗法意革今日之幣宣從所請有旨許之紹興九年敕天下州郡立報恩光孝禪寺為徽宗專建追嚴之所按宋史高宗本紀不載按佛祖統紀紀云云紹興十二年五月停給度僧牒按宋史高宗本紀云云按佛祖統紀十二年左修職郎詹叔義上財賦表乞住賣度牒朝廷從之時臨安府乞度牒修天竺大士殿敕給錢五萬緡謂侍臣曰朕觀古者人主欲除釋老二教或毀其像或廢其徒皆不及久往往愈熾今不放度牒則自可漸銷而制勝紹興十三年敕建佛寺壽星院僧乞撥度牒不許按宋史高宗本紀不載按佛祖統紀十三年敕西湖北山建天申萬壽圓覺寺再修西湖壽星院主事者乞撥度牒上曰言者皆欲賣牒以資國用然一牒所得不過二百緡而一夫不耕矣若住撥十年則其徒自少矣紹興二十四年詔以上天竺為御前道場特免科敷等事紹興三十年十一月住靈隱道昌禪師上表乞頒行度牒不報紹興三十一年禮部侍郎吳子才奏乞頒行度牒言事者以侫佛斥之罷歸田里按以上宋史高宗本紀俱不載按佛祖統紀云云紹興三十二年孝宗即位出內府玉器施大士殿按宋史孝宗本紀不載按佛祖統紀紹興三十二年五月禪位於太子十月淫雨不止上遣內侍禱於上天竺燎煙始升曉日開霽上喜出內府玉器三品以施大士殿壽成太后施七寶冠孝宗乾道元年召僧子琳入見敕禁毀辱僧尼按宋史孝宗本紀不載按佛祖統紀乾道元年二月召靈山子琳法師入見問曰朕欲讀經以何為要師曰金剛圓覺最為要道問參禪之法師曰直須自悟上悅賜號慈受三月以鄭國公主出家敕品官庶民有毀辱僧尼罵稱禿字者依祥符宣和敕旨品官敕停庶民流千里仰天下州軍遍榜曉諭仍許僧尼録白指揮與度牒隨身永同公據應僧尼過犯官司不得私理須奏聞取旨施行乾道三年幸上天竺授僧若訥右街僧録敕建內觀堂於禁中一遵上竺制度按宋史孝宗本紀不載按佛祖統紀乾道三年二月駕幸上天竺禮敬大士問住山若訥曰大士之前合拜不合拜師曰不拜則各自稱尊拜則遞相恭敬上欣然致拜又問歲旦修光明懺之意師曰佛為梵釋四王説金光明三昧之道囑其護國護人後世祖師立為懺儀於歲旦奉行其法為國祈福此盛世之典也上悅授右街僧録復賜錢即道翊法師故居建十六觀堂命內翰樓鑰作記三月敕於禁中建內觀堂一遵上竺制度乾道四年召僧若訥領五十僧入內觀堂修佛事按宋史孝宗本紀不載按佛祖統紀乾道四年四月八日召上竺訥法師領五十僧入內觀堂行護國金光明三昧齋罷説法上曰佛法固妙安得如許經卷師曰有本者如是上悅進授左街僧録慧光法師自是歲歲佛生日賜入內僧帛五十匹修舉佛事乾道七年召僧慧遠入對選德殿按宋史孝宗本紀不載按佛祖統紀乾道七年二月靈隱慧遠禪師入對選德殿上曰如何免得生死對曰不悟大乘終未能免上曰如何得悟對曰本有之性磨以歲月自然得悟上曰悟後如何對曰悟後始知今日問答皆非上曰一切處不是後如何對曰脫體現前更無可見之相上有省首肯之乾道八年幸天竺寺召諸僧集內觀堂賜齋按宋史孝宗本紀乾道八年春正月丁酉幸天竺寺玉津園按佛祖統紀八年正月車駕幸靈隱錫賚有加八月召天竺訥法師徑山印禪師靈隱遠禪師及三教之士集內觀堂賜齋復令遠禪師獨對東閣賜坐問曰前日睡中忽聞鐘聲不知夢覺是同是別對曰夢覺無殊教誰分別上曰鐘聲從何處起對曰從陛下問處起十月賜靈隱慧遠佛海禪師乾道九年幸天竺寺召訥法師獨對選德殿按宋史孝宗本紀乾道九年正月辛酉幸天竺寺玉津園按佛祖統紀九年正月召上竺訥法師獨對選德殿賜坐問大士歷代靈迹及法華經旨淳熙元年詔於上竺建藏殿召僧入對禁中按宋史孝宗本紀不載按佛祖統紀淳熙元年二月賜內帑於上竺建藏殿及賜大藏經皇太子為書殿榜四月召鴈山靈峰中仁禪師入對禁中五月召靈隱遠禪師入對便殿淳熙二年詔建護國金光明道場召僧若訥入對遣中使迎佛舍利塔按宋史孝宗本紀不載按佛祖統紀淳熙二年三月駕幸上竺炷香禮敬大士詔建護國金光明道場賜白雲堂印令天下三教諸宗並詣白雲堂公舉用印甲明有司六月召上竺訥法師獨對內觀堂十二月遣中使至阿育王山迎佛舍利塔上瞻禮之頃見塔上有如月輪他日復見如水晶者敕迎往東宮皇太子見相輪上纍纍若水晶貫珠淳熙三年迎舍利於碧琳堂詔以天台教文入藏召僧德光入對選德殿按宋史孝宗本紀不載按佛祖統紀淳熙三年正月迎舍利於碧琳堂上見塔角有光若金珠者敕內侍奉塔還山具齋以謝靈貺又敕福州依天聖二年已降聖旨天台一宗教部付開元東禪鏤版入藏先是慈雲式法師奏乞天台教文入藏詔可之二月詔台州報恩德光禪師入住靈隱十一月入對選德殿上問曰釋迦雪山六年所成者何事師曰將謂陛下忘卻上説賜號佛照禪師淳熙四年召光禪師入對內殿按宋史孝宗本紀不載按佛祖統紀淳熙四年召靈隱光禪師入對內殿進宗門直指上問浙東名山太白玉几之外以何為勝師曰保國護聖國清萬年上悅當時侍臣咸皆歎賞以為名對淳熙五年御書太白名山賜住山了朴禪師按宋史孝宗本紀不載按佛祖統紀云云淳熙七年召僧雪竇等入對內殿按宋史孝宗本紀不載按佛祖統紀淳熙七年召明州雪竇寶印禪師入見上問曰三教聖人本同此理師曰譬如虗空初無南北上曰但所立門戶異耳故孔子以中庸設教師曰非中庸何以立世問華嚴有云不壞世間相而成出世間法上曰今時學者祗觀文字不識夫子心師曰非獨今之學者當時顏子為具體祇説得瞻之在前忽焉在後如有所立卓爾亦未足以識夫子心夫子亦曰二三子以我為隱乎吾無隱乎爾以此而觀當時弟子尚不識夫子心況今人乎張商英有云唯吾學佛然後能知儒上曰朕意常作此見上又問曰老莊之教何如師曰可比佛門中小乘人耳小乘厭身如桎梏棄智如雜毒化火焚身入無為界正如莊子形固可使如稿木心固可使如死灰老子曰吾有大患為吾有身大乘人則不然度衆生盡方證菩提正如伊尹所謂子天民之先覺者也將以斯道覺斯民也如有一夫不被其澤者若己推而內之溝中也上大悅即日詔住徑山又詔佛照禪師德光住阿育王山十一月召對內殿賜妙勝之殿四字為釋迦舍利殿額淳熙十年上親注圓覺經賜徑山寶印禪師刊行於世按宋史孝宗本紀不載按佛祖統紀云云淳熙十一年僧録若訥請試經以行古道貴牒以限常人詔下僧司具格式以供申不明不果行按宋史孝宗本紀不載按佛祖統紀淳熙十一年上竺左街僧録若訥劄子洪惟聖朝遵用唐制立試經度僧之科竊詳大宋高僧傳洪覺範僧寶傳所載自建隆開國至於南渡名德高行皆先策試法華然後得度以由此經是如來出世一化之妙唱羣生之宗趣袟惟七卷繁簡適中故學者誦習無過與不及之患自唐至今五百年來昭乖令典雖下及萬世可舉而行唐世之世遠矣及我朝而甚詳如文瑩湘山録載國初潭州僧童試經此州郡比試也歐陽歸田録載執政宋綬夏竦同試童行此朝廷開試也若僧史略載朱梁時不許私度願出家者入京比試竊詳三書之意當是天下童行先就州郡試中然後入京執政開場親監覆試第名奏上乃下祠部給牒若特詔疏恩如建隆八千僧太平普度十七萬則又不在試經之限或謂有虧國用者則將對之曰但於每歲以干牒為試經之擬即以千牒之資均於餘牒俾不能誦經而裕於財者亦得求度厥今天下僧冗矣試經以行古道貴牒以限常人誠足以復祖宗之成法救未流之冗弊也上可其奏付執政下僧司具格式以供申不明竟為中書所沮淳熙十六年光宗即位尊孝宗號壽皇壽皇召慧光若訥法師注金剛般若經按宋史光宗本紀淳熙十六年二月壬戌孝宗行內禪禮帝上尊號曰至尊壽皇聖帝按佛祖統紀壽皇召慧光若訥法師入內殿注金剛般若經書成上積日披覽益有省發光宗紹熙二年十月慧光法師入寂諡宗教廣慈法師塔曰普照按宋史光宗本紀不載按佛祖統紀云云寧宗慶元三年敕加封隋僧智者為靈惠大師按宋史寧宗本紀不載按佛祖統紀慶元三年荊門軍申忠翊郎趙善瑩狀當陽縣玉泉山景德禪寺為隋智者禪師開山道場蜀將軍關王奉智者為師祈禱屢應乞賜加封敕宜賜靈惠大師嘉定十一年正月乙未以度僧牒千給四川軍費按宋史寧宗本紀云云理宗寶慶二年敕天申萬壽圓覺寺改為天台教以師贊法師主之按宋史理宗本紀不載按佛祖統紀云云淳祐六年敕以僧澄照諸記附入大藏按宋史理宗本紀不載按佛祖統紀淳祐六年十一月臨安明慶聞思律師奏南山澄照律師戒疏業疏事鈔等并大智律師述三部諸記共七十三卷乞附入大藏制可續據省部下諸郡經坊鏤板頒行淳祐十年敕指占有額寺院充守墳功德者並與追正按宋史理宗本紀不載按佛祖統紀淳祐十年三月臣寮上言國家優禮元勳大臣近貴戚里聽陳乞守墳寺額蓋謂自造屋宇自置田産欲以資薦祖父因與之額故大觀降旨不許近臣指射有額寺院充守墳功德及紹興新書不許指射有額寺院著在令甲凡勳臣戚里有功德院止是賜額蠲免科敷之類聽從本家請僧住持初非以國家有額寺院與之邇年士夫一登政府便萌規利指射名剎改充功德侵奪田産如置一莊子弟無狀多受庸僧財賄用為住持米鹽薪炭隨時供納以一寺而養一家其為汗辱祖宗多矣況宰執之家所在為多若人占數寺則國家名剎所餘無幾官中一有科需則必均諸人戶豈不重為民害臣愚欲望睿旨申嚴舊制應指占敕額寺院並與追正仍從官司請僧庶以杜絶私家交通寺院賄貨之弊制可度宗咸淳九年五月丁卯申禁姦民妄立經會私創菴舍以避征徭保伍容庇不覺察坐之按宋史度宗本紀云云金太宗天會元年十月己亥上京慶元寺僧獻佛骨却之按金史太宗本紀云云海陵貞元三年以張浩張暉見僧法寶失大臣體命各杖之按金史海陵本紀貞元三年三月壬子以左丞相張浩平章政事張暉每見僧法寶必坐其下失大臣體各杖二十僧法寶妄自尊大杖二百乙卯命以大房山雲峯寺為山陵建行宮其麓正隆元年二月庚辰御宣華門觀迎佛賜諸寺僧絹五百匹綵五十段銀五百兩十一月癸巳禁二月八日迎佛按金史海陵本紀云云世宗大定二年正月甲戌除迎賽神佛禁令按金史世宗本紀云云大定十四年諭民無建佛寺按金史世宗本紀大定十四年四月乙丑上諭宰臣曰聞愚民祈福多建佛寺雖已條禁尚多犯者宜申約束無令徒費財用大定二十六年幸諸佛寺按金史世宗本紀大定二十六年三月癸巳香山寺成幸其寺賜名大永安給田二千畝粟七千株錢二萬貫九月辛丑幸仙洞寺壬寅幸香林淨名二寺甲辰朔幸盤山上方寺因遍歷中盤天香感化諸寺章宗承安四年二月庚午御宣華門觀迎佛按金史章宗本紀云云宣宗貞祐三年五月壬戌降空名宣敕紫衣師德號度牒以補軍儲八月丙申諭樞密院撒合輦所簽軍有具戒僧人可罷遣之按金史宣宗本紀云云
