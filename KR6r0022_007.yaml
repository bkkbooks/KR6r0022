body:
  text: 佛國記鄯善國其國王奉法可有四千餘僧悉小乘學諸國俗人及沙門盡行天竺法但有精粗從此西諸國類皆如是惟國國胡語不同然出家人皆習天竺書天竺語𠌥夷國其國僧有四千餘人皆小乘學法則齊整秦土沙門至彼都不預其僧例于闐國其國人民盡皆奉法以法樂相娛衆僧乃數萬人多大乘學皆有衆食彼國人民星居家家門前皆起小塔最小者可高二丈許作四方僧房供給客僧其國僧伽藍名瞿摩帝是大乘學國中十四大僧伽藍不數小者從四月一日城裏便灑掃道路莊嚴巷陌其城門上張大幃幕事事嚴餝王及夫人采女皆住其中瞿摩帝僧是大乘學王所敬重最先行像離城三四里作四輪像車高三丈餘狀如行殿七寶莊校懸繒幡蓋像立車中二菩薩侍作諸天侍從皆金銀雕瑩懸於虗空像去門百步王脫天冠易著新衣徒跣持華香翼從出城迎像頭面禮足散華燒香像入城時門樓上夫人采女搖散衆華紛紛而下如是莊嚴供具車車各異一僧伽藍則一日行像四月一日為始至十四日行像乃訖行像訖王及夫人乃還宮耳其城西七八里有僧伽藍名王新寺作來八十年經三王方成可高二十五丈雕文刻鏤金銀覆上衆寶合成塔後作佛堂莊嚴妙好梁柱戶扇窗牖皆以金薄別作僧房亦嚴麗整餝非言可盡嶺東六國諸王所有上價寶物多作供養子合國其國王精進有千餘僧多大乘學竭叉國其國王作般遮越師般遮越師漢言五年大會也會時請四方沙門皆來雲集莊嚴衆僧坐處懸繒幡蓋作金銀蓮華著繒座後鋪淨坐具王及羣臣如法供養或一月二月或三月多在春時王作會已復勸諸羣臣設供供養或一日二日三日五日供養都畢王以所乘馬鞍勒自副使國中貴重臣騎之并諸白㲲種種珍寶沙門所須之物共諸羣臣發願布施布施已還從僧贖其地山寒不生餘穀唯熟麥耳衆僧受歲已其晨輒霜故其王每讚衆僧令麥熟然後受歲其國中有佛唾壺以石作色似佛鉢又有佛一齒國人為佛齒起塔有千餘僧盡小乘學陀歷國其國有衆僧皆小乘學烏萇國其國佛法甚盛名衆僧住止處為僧伽藍凡有五百僧伽藍皆小乘學若有客比丘到悉供養三日三日過已乃令自求所安弗樓沙國其國佛昔將諸弟子遊行佛鉢即在此月氏王大興兵衆來伐此國欲取佛鉢既伏此國已月氏王篤信佛法欲持鉢去故興供養供養三寶畢乃校飾大象置鉢其上象便伏地不能得前更作四輪車載鉢八象共牽復不能進王知與鉢緣未至深自愧歎即於此處起塔及僧伽藍并留鎮守種種供養可有七百餘僧日將中衆僧則出鉢與白衣等種種供養然後中食至暮燒香時復爾可容二斗許雜色而黑多四際分明厚可二分瑩徹光澤貧人以少華投中便滿有大富者欲以多華而供養正復百千萬斛終不能滿那竭國其國醯羅城中有佛頂骨精舍盡以金薄七寶校飾國王敬重頂骨慮人抄奪乃取國中豪姓八人人持一印印封守護清晨八人俱到各視其印然後開戶開戶已以香汁洗手出佛頂骨置精舍外高座上以七寶圓砧砧下琉璃鐘覆上皆珠璣校飾骨黃白色方圓四寸其上隆起每日出後精舍人則登高樓擊大鼓吹螺敲銅鈸王聞已則詣精舍以華香供養供養已次第頂戴而去從東門入西門出王朝朝如是供養禮拜然後聽國政居士長者亦先供養乃修家事日日如是初無懈倦供養都訖乃還頂骨於精舍中有七寶解脫塔或開或閉高五尺許以盛之精舍門前朝朝恆有賣華香人凡欲供養者種種買焉諸國王亦恆遣使供養精舍處方四十步雖復天震地裂此處不動羅夷國其國近有三千僧兼大小乘學跋那國其國亦有三千許僧皆小乘學毗茶國其國佛法興盛兼大小乘學見秦道人往乃大憐憫作是言如何邊地人能知出家為道遠求佛法悉供給所須待之如法東南諸寺甚多僧衆萬數摩頭羅國其國捕那河邊左右有二十僧伽藍可有三千僧佛法轉盛凡沙河以西天竺諸國國王皆篤信佛法供養衆僧時則脫天冠共諸宗親羣臣手自行食行食已鋪氈於地對上座前坐於衆僧前不敢坐牀佛在世時諸王供養法式相傳至今從是以南名為中國中國寒暑調和無霜雪人民殷樂無戶籍官法唯耕王地者乃輸地利欲去便去欲住便住王治不用刑罔有罪者但罰錢隨事輕重雖復謀為惡逆不過截右手而已王之侍衛左右皆有供祿舉國人民悉不殺生不飲酒不食葱蒜唯除旃荼羅旃荼羅名為惡人與人別居若入城市則擊木以自異人則識而避之不相搪揬國中不養豬雞不賣生口市無屠行及酤酒者貨易則用貝齒唯旃荼羅獵師賣肉耳自佛般泥洹後諸國王長者居士為衆僧起精舍供養供給田宅園圃民戶牛犢鐵券書録後王王相傳無廢至今不絶衆僧住止房舍牀縟飲食衣服都無缺乏處處皆爾衆僧常以作功德無業及誦經坐禪客僧往到舊僧迎逆代擔衣鉢給洗足水塗足油與非時漿須臾息已復問其臘數次第得房舍臥具種種如法衆僧住處作舍利佛塔目蓮阿難塔并阿毗曇律經塔安居後一月諸希福之家勸化供養僧作非時漿衆僧大會說法說法已供養舍利佛塔種種香華通夜然燈使彼人作舍利弗本婆羅門時詣佛求出家大目蓮大迦葉亦如是諸比丘尼多供養阿難塔以阿難請世尊聽女人出家故諸沙彌多供養羅云阿毗曇師者供養阿毗曇律師者供養律年年一供養各自有日摩訶衍人則供養般若波羅蜜文殊師利觀世音等衆僧受歲竟長者居士婆羅門等各持種種衣物沙門所須以布施僧衆僧亦自各布施佛泥洹已來聖衆所行威儀法則相承不絶拘薩羅國其國城南門千二百步道西長者須達起祗洹精舍佛上忉利天為母說法波斯匿王思見佛即刻牛頭栴檀作佛像置佛坐處祗洹精舍木有七層諸國王人民競興供養懸繒幡蓋散華燒香然燈續明日日不絶鼠銜燈炷燒花幡蓋遂及精舍七重都盡諸國王人民皆大悲惱謂栴檀像已燒却後四五日開東小精舍戶忽見本像皆大歡喜共治精舍得作兩重遂移像本處摩竭提國其國昔阿育王作小兒時當道戲遇釋迦佛行乞食小兒歡喜即以一掬土施佛佛持還泥經行地因此果報作鐵輪王王閻浮提乘鐵輪案行閻浮提見鐵圍兩山間地獄治罪人即問羣臣此是何等答言是鬼王閻羅治罪人王自念言鬼王尚能作地獄治罪人我是人主何不作地獄治罪人耶即問臣等誰能為我作地獄主治罪人者臣答言唯有極惡人能作耳王即遣臣遍求惡人見泄水邊有一長壯黑色髮黃眼青以腳鉤兼魚口哹禽獸禽獸來便射殺無得脫者得此人已將來與王王密敕之汝作四方高牆內植種種華果并好谷池莊嚴校飾令人渴仰牢作門戶有人入者輒捉種種治罪莫使得出設使我入亦治罪莫放今拜汝作地獄主有比丘次第乞食入其門獄卒見之便欲治罪比丘惶怖求請須臾聽我中食俄頃得有人入獄卒內置碓臼中搗之赤沫出比丘見已思惟此身無常苦空如泡如沫即得阿羅漢既而獄卒捉內鑊湯中比丘心顏欣悅火滅湯冷中生蓮華比丘坐上獄卒即往白王獄中奇怪願王往看王言我前有要今不敢往獄卒言此非小事王宜疾往更改先要王即隨入比丘為說法王得信解即壞地獄悔前所作衆惡由是信重三寶常至貝多樹下悔過自責受八齊王夫人問王常遊何處羣臣答言恆在貝多樹下夫人伺王不在時遣人伐其樹倒王來見之迷悶躃地諸臣以水灑面良久乃蘇王即以磚纍四邊以百罌牛乳灌樹根身四布地作是誓言若樹不生我終不起誓已樹便即根上而生以至於今今高減十文師子國其國王遣使中國取貝多樹子於佛殿旁種之高可二十丈其樹東南傾王恐倒故以八九圍柱柱樹樹當拄處心生遂穿柱而下入地成根大可四圍許柱雖中裂猶裏在其外人亦不去樹下起精舍中有坐像道俗敬仰無倦城中又起佛齒精舍皆七寶作王淨修梵行城內人信敬之情亦篤其國立治以來無有饑荒喪亂衆僧庫藏多有珍寶無價摩尼其王入僧庫遊觀見摩尼珠即生貪心欲奪取之三日乃悟即詣僧中稽首悔前罪心告白僧言願僧立制自今已後勿聽王入其庫看比丘滿四十臘然後得入其城中多居士長者薩薄商人屋宇嚴麗巷陌平整四衢道頭皆作說法堂月八日十四日十五日鋪施高座道俗四衆皆集聽法其國人云都可五六萬僧悉有衆食王別於城內供五六千人衆須食者則持本鉢往取隨器所容皆滿而還佛齒常以三月中出之未出十日王莊校大象使一辨說人著王衣服騎象上擊鼓唱言菩薩從三阿僧祇劫苦行不惜身命以國妻子及挑眼與人割肉貿鴿截頭布施投身餓虎不吝髓腦如是種種苦行為衆生故成佛在世四十九年說法教化令不安者安不度者度衆生緣盡乃般泥洹泥洹已來一千四百九十七年世間衆生長悲却後十日佛齒當出至無畏山精舍國內道俗欲植福者各各平治道路嚴飾巷陌辦衆華香供養之具如是唱已王便夾道兩邊作菩薩五百身種種變現或作須大拿或作睒變或作象王或作鹿馬如是形像皆彩畫莊校狀若生人然後佛齒乃出中道而行隨路供養到無畏精舍佛堂上道俗雲集燒香然燈種種法事晝夜不息滿九十日乃還城內精舍城內精舍至齊日則開門戶禮敬如法無畏精舍東四十里有一山山中有精舍名跋提可有二千僧僧中有一大德沙門名達摩瞿諦其國人民皆共宗仰住一石室中四十許年常行慈心能感蛇鼠使同止一室而不相害城南七里有一精舍名摩訶毗訶羅有三千僧住有一高德沙門戒行清潔國人咸疑是羅漢臨終之時王來省視依法集僧而問比丘得道耶便以實答言是羅漢既終王即案經律以羅漢法葬之於精舍東四五里積好大薪縱廣可三丈餘高亦爾近上著栴檀沈水諸香木四邊作階上持淨好白㲲周匝𫎇𧂐上作大輿牀似此間輲車但無龍魚耳當闍維時王及國人四衆咸集以華香供養從輿至墓所王自華香供養供養訖輿著𧂐上蘇油遍灌然後燒之火然之時人人敬心各脫上服及羽儀傘蓋遙擲火中以助闍維闍維已即檢取骨以起塔王篤信佛法欲為衆僧作新精舍先設大會飯食僧供養已乃選好上牛一雙金銀寶物莊校角上作好金犁王自耕四邊然後割給民戶田宅書以鐵券自是已後代代相承無敢廢易續博物志釋氏之源秦二十一年鑄金狄十二釋氏之源本霍去病討休屠王獲其祭天金人武帝以為神列於甘泉宮魏黃初元年徙長安銅狄重不可致或言金狄泣因留霸城南人有見薊子訓與父老共摩銅狄曰正見鑄此時計爾日已近五百年矣董卓毀其九為錢苻堅毀其二為錢其一百姓推置陝北河中或云翁仲頭髻常出晉軍至髻不復出野客叢談佛入中國傅奕韓退之皆言佛自後漢明帝時始入中國此蓋論其顯然者不知佛法之入中國其來久矣觀魏略西戎傳曰昔漢哀元壽元年博士景慮受大月氏王使伊存口傳浮屠經又觀劉向列仙序曰得仙者百四十六人其七十四人已在佛經則知漢成哀間已有佛經矣觀漢武故事昆邪王殺休屠王以其衆降得金人之神上置之甘泉宮金人皆長丈餘其祭不用牛羊惟燒香禮拜上使依其國俗又元狩三年穿昆明池底得黑灰帝問東方朔朔曰可問西域道人知是劫灰又知佛法自武帝時已入中國矣今人惟知佛法入中國自明帝始不知自武帝始也薛正已記仲尼師老聃老聃師竺乾審是則佛入中國又不止於武帝墨池浪語佛法入中國佛法入中國不始於漢明帝列子西方有聖人老子師竺乾可證蓋周穆王時文殊目連來化穆王即列子所謂化人也化人示穆王云高四臺是迦葉佛說法處因造三會道場至秦穆公時扶風獲一石佛穆公不識棄馬坊中公疾令由余往視之曰此真佛神也公取像澡浴安清淨處像遂放光公宰牲祭之神擎棄遠處由余又曰臣聞佛清淨所有供養燒香而已公遂欲造佛像由余於高四臺南村得一老人姓王名安年百八十自云曾於三會道場見人造之臣老無力村北有兄弟四人曾於道場內為諸匠執作今請共造成一銅像相好圓備公悅大賞賚之彼人於土臺上造重閣高三百尺時人號為高四臺其人姓高兄弟四人同立故也故名高四然則秦穆公時佛法已入中國矣
