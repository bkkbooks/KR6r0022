body:
  text: 明太祖洪武四年詔徵高僧廣薦佛會按宋濂蔣山寺廣薦佛會記洪武四年冬十有二月詔徵江南高僧十人欽天監擇日於蔣山太平興國禪寺建薦法會上宿齋室却葷肉弗御者一月復敕中書右丞相汪廣洋左丞相胡惟庸移書城社之神具宣上意俾達諸冥期以畢集洪武五年大建鍾山法會按列朝詩集洪武五年正月十五日朝廷就鐘山寺大建法會普濟幽冥四年十二月十五日上御奉天殿集公侯百官宣諭建會之因禁天下屠宰上先齋戒一月以嚴法至正月十三日三鼓時上御奉天殿集公侯百官奉上佛表命禮部尚書齎赴鐘山啓建法會焚之十五日上服袞冕乘輦輅赴法會至日夕迎佛上率公侯百官臨法筵供佛行大禮樂用善世等曲先是十四日微雪呈祥尋即開霽是夕星月在天風露湛寂絲竹迭奏燈火交輝禮儀之盛前古莫及洪武六年封番僧為灌頂國師及贊善等王俱賜金章誥命按明通紀洪武六年八月詔西番土番各族酋長舉故有官職者至京受職賜印俾因俗為治以故元攝帝師喃加巴藏卜為熾盛佛寶國師分設烏思藏甘朵衛二都指揮使司自指揮宣慰招討等司及萬戶府千戶所凡三十三處以官其酋長自是番僧有封為灌頂國師及贊善王闡化王正覺大乘法王如來大寶法王者俱賜金章誥命領其人民間歲朝貢洪武十五年改善世院為僧録司設左右善世闡教講經覺義以司釋教之事是歲詔選高僧分侍諸王按明會典國初置善世院洪武十五年改僧録司正六品衙門設左右善世左右闡教左右講經左右覺義職專釋教之事屬禮部其衙門南京建於天界寺永樂後北京建於大興隆寺今大興隆寺徙於大隆善寺凡本司官俱選精通經典戒行端潔者為之不支俸如有文移以僧人掌行僕從以佃戶充役凡僧有三等曰禪曰講曰教在外僧人府屬僧綱司州屬僧正司縣屬僧會司管領皆統於本司凡本司官每月止朝朔望班列於西如遇慶賀頒詔等事行禮皆預班列於東凡在京祭祀本司官皆不預在外同凡內外僧官專一檢束天下僧人恪守戒律清規違者從本司懲治若犯與軍民相干者從有司懲治按明通紀十五年詔選高僧分侍諸王僧道衍往燕府住持慶壽禪寺洪武二十年令民年二十以上者不許為僧按明會典云云洪武二十五年定僧官僧人服色又令造周知册頒示天下僧寺按明會典凡僧官僧人服色洪武二十五年令瑜珈僧許穿靴凡僧人給授度牒洪武二十五年令本司造周知册編次在京在外寺院僧人備開各年甲姓名字行及為僧年月并所給度牒字號頒示天下僧寺備照凡遊方行腳至者以册驗之其有不同許護送有司解京治以重罪容留者罪如之其後不造歲久仍有詐偽者至正統五年令照舊造册洪武二十六年令試僧能通經典者給牒按明會典洪武二十六年令各司每三年考試能通經典者申送到部具奏出給度牒凡各處額設寺俱有僧人住持從各寺僧人保舉有戒行通經典者僧綱等司申本司給與劄付其有錢糧大寺轉申禮部出給劄付惠宗建文四年六月燕王即位十月以僧道衍為僧録司左善世按明通紀云云成祖永樂二年擢僧道衍為太子少保按明通紀永樂二年四月擢左善世僧道衍為太子少保始復姓姚賜名廣孝上自是稱為姚少師而不名亦終不蓄髮娶妻居止多在僧寺常賜二宮人亦不近上乃召還之永樂四年迎西僧尚師哈立麻至京師按明通紀永樂四年迎西僧尚師哈立麻至京師先是上在藩邸聞烏思藏有尚師哈立麻者異僧也及即位遣中官僕顯齎書幣往迎五歷寒暑乃至車駕往視之無拜跪禮合掌而已按明外史方技傳釋子智光武定人洪武時奉命兩使烏斯藏榜葛剌泥八剌地湧塔諸國永樂時又使烏斯藏迎尚師哈立麻遂通番國諸經多所翻譯歷事六朝寵錫冠群僧永樂五年以諸郡請度牒僧千八百人發戍遼東甘肅命西僧尚師哈立麻啓建法壇尋加封使領天下釋教按明通紀永樂五年正月直𨽻及浙江諸郡軍民子弟披剃為僧赴京請度牒者千八百人禮部以聞上怒曰皇考之制民年四十以上始聽出家今犯禁若此是不知有朝廷矣命悉付兵部編軍籍發戍遼東甘肅二月命西僧尚師哈立麻於靈谷寺啓建法壇薦祀皇考皇妣尚師率天下僧伽舉場普度大齋科十有四日卿雲天花甘雨甘露舍利祥光青鳥白鶴連日畢集一夕檜柏生金色花遍於都城金仙羅漢變現雲表白象青獅莊嚴妙相天燈導引幡蓋旋繞種種不絶又聞梵唄空樂自天而隆羣臣上表稱賀學士胡廣等獻聖孝瑞應歌頌自是之後上潛心釋典作為佛曲使宮中歌舞之三月封西僧哈立麻為萬行具足十分最勝圓覺妙智慧普應祐國演教如來大寶法王西天大善自在佛領天下釋教賜金百兩銀千兩彩幣寶鈔織金珠袈裟金銀器皿鞍馬賜儀仗與郡王同其徒孛羅等皆封為大國師並賜印誥金幣等物宴之於華蓋殿永樂六年禁軍民子弟僮奴自削髮為僧按明會典永樂六年令軍民子弟僮奴自削髮為僧者并其父兄送京師發五臺山做工畢日就北京為民種田及盧龍牧馬寺主僧擅容留者亦發北京為民種田永樂八年命番僧為國師又遣使往西土徵尚師昆澤思巴按明大政紀永樂八年九月庚申命番僧綿思吉等為淨慈妙濟國師各絡護敕俾自在修行遣內宮關僧齎書及銀幣往西土徵尚師昆澤思巴十月命番僧班丹藏卜等為淨覺弘濟等國師把辨等為禪師各給誥印永樂十年十二月烏思藏尚師昆澤思巴來朝先遣人進舍利佛像按明大政紀云云永樂十五年禁僧尼私創菴院按明會典云云永樂十六年定度僧例并僧人額數按明會典永樂十六年定凡度僧例以十年一次先期禮部奏準在京行童從本寺具名在外從僧綱等司造册給批俱由本司轉申禮部施行本部孝試能通經典者給與度牒其僧人額數府不過四十人州三十人縣二十人永樂十七年頒佛經佛曲按明通紀永樂十七年秋御製佛曲成並刊佛經以傳九月十二日欽頒佛經至大報恩寺當日夜本寺塔見舍利光如寶珠十三日現五色毫光卿雲捧日千佛觀音菩薩羅漢妙相畢集續頒佛經佛曲至淮安給散又現五色圓光彩雲滿天雲中現菩薩羅漢天花寶塔龍鳳獅象又有紅鳥白鶴盤旋飛繞續又命尚書呂震都御史王彰齎捧諸佛世尊如來菩薩尊者名稱歌曲往陝西河南頒給神明協應屢現卿雲圓光寶塔之祥文武羣臣上表稱賀上甚喜悅中官因是益重佛禮僧建立梵剎以祈福者遍兩京城內外云永樂十九年西僧大寶法王來朝按明通紀永樂十九年西僧大寶法王來朝或請駕親勞之夏原吉曰夷人慕義遠來宜示以倫義若萬乘一屈下必有走死而不顧者矣上曰爾欲效韓愈耶乃不出勞他日法王入見上命原吉拜之原吉曰王人雖微序於諸侯之上況夷狄耶長揖而已仁宗洪熙元年賜釋智光號大國師錫以金印按明外史方技傳仁宗頗信異教釋子有智光者亦賜號圓融妙慧淨覺弘濟輔國光範衍教灌頂廣善大國師錫以金印英宗嗣位復加號西天佛子錫以玉印其崇信如此宣宗宣德四年吳忠奏修圓果寺塔不許按明通紀宣德四年二月工部尚書吳忠言昨上西圓果寺奏本寺是古迹道場為國祝聖之所舊塔損壞乞役民為之上曰卿欲藉此求福乎朕以安民為福其止之勿勞吾民宣德八年令天下有司關津但遇削髮之人捕送原籍治罪如律按明會典云云英宗正統元年復造僧人周知册按明通紀英宗正統元年十月令僧録司復照洪武舊制造僧人周知册洪武中凡僧人給受度牒令本司造周知册自在京及在外寺院僧名以次編之其年甲姓名字行及始為僧年月與所授度牒字號俱載於僧名以下頒示天下僧寺凡遊腳至者以册驗之其不同許拿送有司解京治以重罪容留者罪如之其後不造歲久詐偽者多至是令覆照舊造按前洪武二十五年會典云正統五年令熙舊造册與此年分互異正統十年賜大藏經於甘露寺按續文獻通考正統十年春二月賜大藏經於甘露寺敕曰朕體天地保民之心恭成皇曾祖考之志刊印大藏經典頒賜天下用廣流傳茲以大藏安置直𨽻鎮江府甘露禪寺永充供養所在僧官僧徒看誦讚揚上為國家祝𨤲下為生民祈福須務敬奉守護不許縱容間雜之人私借觀玩輕慢褻瀆致有損壞遺失敢有違者必重究之故諭正統十三年修大興隆寺作佛事按名山藏典謨記正統十三年二月修大興隆寺禁城西作佛事上臨幸焉寺初名慶壽金章宗時所創王振言其朽敝上大役軍民重修費物料巨萬既成壯麗甲於京師代宗景泰五年車駕擇日臨幸隆福寺以楊浩等上疏即日罷行按明道紀景泰五年四月新建隆福寺成車駕擇日臨幸有司已夙駕除道太學生濟寧楊浩上疏言陛下即位之初首幸太學海內之士聞風快覩今又棄儒術而重佛教豈有聖明之主事夷狄之鬼而可垂範後世者耶儀制郎中章綸亦上疏言佛者夷狄之法非聖人之道以萬乘之尊臨非聖之地史官書之傳之萬世實纍聖德帝覽疏即日罷行按名山藏典謨記景泰四年三月大隆福寺成寺甲京師費以數十萬按通紀作五年四月此作四年三月互異英宗天順元年敕賜中外寺額按名山藏典謨記天順元年十月敕中外寺額曰真慶嘉福圓林觀音淨覺普壽南泉雲間慶寧永慶妙亨常樂顯寧惠明昭靈昭寧碧峰護國景會福巖靈雲報因報國大勝清源普利英臺慈會興善淨業廣福崇化法空廣惠延壽龍泉普濟靜仁業慶龍興凡四十寺十一月賜中外寺額曰清光永泰龍泉靈巖歸義隆安地藏重熙法幢延供華光普陀大雲海會智安福勝普應青塔陽坡穀積石佛夕照普安通法普仁嘉福法寧開化大寧法寶罔極永峯圓廣觀音顯法永福保安崇慶廣福圓真凡四十寺天順二年敕今後僧徒每十年一度按明大政紀天順二年正月敕今後僧徒每十年一度景泰間太監興安崇信佛教每三年度僧數萬於是僧徒多濫天順二年又如期天下僧徒復來京師聚集數萬上召李賢曰僧徒豈可如此泛濫賢對曰陛下明見最是宜禁之遂出榜曉諭今後每十年一度擅自披剃二十以上者俱令還俗違者發邊衛充軍度者俱照定額考送於是僧徒散去天順八年令僧年二十以上無度牒者勒還俗按明會典天順八年令各處僧人年二十以上無度牒者即便還俗有隱瞞年歲者并其師治罪憲宗成化二年三月命禮部給度牒鬻僧以賑濟飢民按明大政紀云云成化四年封西僧為法王佛子國師按名山藏典謨記成化四年四月封西僧劄巴堅參為萬行莊嚴功德最勝智慧圓明能仁感應顯國光教弘妙大悟法王西天至善金剛普濟大智慧佛劄實巴為清修正覺妙慈普濟護國衍教灌頂弘善西天佛子大國師鎖南堅參為靜修弘善國師九月癸亥彗星見六科給事中魏元等言僧徒過為信待每遇生愍之辰輒費無限資財建無益齋醮而西番劄實巴等又加以法王名號賞賚隆厚出乘棕轎導用金吾計其奉養過於親王又朝廷賞賚無節玩好太多或印施經懺或填寫佛經或為繪畫之像或造寶石之具雲南等處礦場採辦不止如此而欲民富國安不可得也伏惟陛下革去法王等號敕止寺觀不得建醮修齋節無益之賞罷不急之好十三道御史康永韶等亦奏佛之無益從古論之今寵遇番僧有佛子國師法王名號儀衛過於王侯服玩擬於供御錦衣玉食徒類數百竭閭閻之脂膏奉虗幻之妄徒又多中國之人習為番教圖寵貴者伏望資遣番僧使之還國若繫中國人追奪成命使供稅役如是則民生厚上納之命西天佛子劄實巴出所求田地歸民禮部請發遣番僧上曰恐失遠人心惟禁僭耳監察御史左鈺言比者言官陳言請革番僧名號斷天下之疑絶後代之惑陛下是之及禮部欲行發遣又復停罷伏望師周孔之格言行堯舜常道佛若有知必是臣言不報成化六年上欲於西山建佛閣以六科給事中諫己之按明大政紀成化六年五月上欲於西山建佛閣六科給事中言四方旱夏秋無收百姓嗷嗷待哺荊襄流民強梗陝西虜寇侵掠致勞宸慮分遣大臣巡視動調官軍今乃起無名之工為不急之務徒費國用有傷治體若謂建閣果有福利孰若以之賑濟飢民賞勞軍士其為福利豈不大哉上曰歲荒民飢西山佛閣其亟已之成化十年敕建塔葬大應法王撥官軍四千供役按名山藏典謨記成化十年三月崇王之國大應法王劄實巴死有旨如大慈法王例建塔葬之撥官軍四千供役禮科給事中王坦言劄實巴夷狄之人假名釋氏陛下待之殊禮封之顯號特借此以撫其種類使不患邊耳如例祭葬之足矣而祭祀之品逾於王者造塔之費幾於山陵今畿甸飢饉連年餓殍載路即以是費拯流難垂死之民豈不愈於厚一荒誕之胡僧哉上曰給事中言濫矣大應法王造塔比大慈法王已減三之二不許成化十二年大學士商輅等請禁給番僧金銀印信及造塔按名山藏典謨記成化十二年七月大學士商輅等條陳時政六事其一言哈密等處番人來京攜帶玉石多被細人誘引進貢計囑行戶高直賣官規取厚利間住番僧往往自都綱禪師升至國師佛子法王等給與金銀印信圖書其有死亡徒弟承襲更求造塔二者皆侵耗朝廷財物宜行禁治成化十四年六月大慈恩寺禪師喃渴領占等乞給銀印許之按名山藏典謨記云云成化十五年以傳奉得官者二十餘人按名山藏典謨記成化十五年九月傳奉升禪師結幹領占為國師冠帶十月傳奉升僧繼曉為僧録司左覺義閏十月升大慈恩寺國師乳奴班丹為灌頂大國師覺義綽吉堅參為國師大隆善護國寺灌頂大國師班卓兒藏卜為佛子國師著癿領占為灌頂國師其以傳奉得官者四人十一月以傳奉得官者十七人成化十八年九月大慈恩寺灌頂大國師劄實堅銼乳奴班班丹得升為西天佛子賜誥命衣帽等物成化十九年二月命襄城侯李瑾統軍夫萬人修大慈恩寺按以上俱名山藏典謨記云云成化二十年建大鎮國永昌寺是年以傳奉得官者三十有七人按明通紀成化二十年建大鎮國永昌寺下刑部員外郎林俊及後軍都督府經歷張黻獄并謫遠州先是僧繼曉者始以淫術欺誑楚府事敗走匿京師緣梁芳等引入禁中其術得售尊為法王賜美珠十餘金寶不可勝計乃言於上發內庫銀數十萬兩西華門外折毀民居創建佛寺大臣畏罪皆不言於是林俊上疏言今年以來災異迭興兩京地震陵寢動搖日月繼蝕野熊入城監戒之昭莫此為甚陝西山西河南連年飢饉人民流離餓死填路賑濟無從可為流涕而僧繼曉乃欺罔聖德發內庫銀數十萬建大鎮國永昌寺以有用之財供無益之費工役不息人怨日興臣謂不斬繼曉異日之禍未可言也然縱之者梁芳也芳傾覆陰狠引用姦邪排斥忠良數年之間假以進貢買辦為名盜祖宗百餘年之府庫殆盡家資山積尚銘不足多所在風擾汪直莫能過今內而朝臣以及閭井之徒亦皆痛心飢民之死莫不欲食梁芳繼曉之肉而卒不敢以此言進者所惜者官所畏者死耳臣何忍畏死不言以為陛下仁聖之纍耶上覽疏大怒下俊錦衣衛獄張黻上疏論救并逮赴獄各杖數十謫俊雲南姚州判官黻降宗州知州按名山藏典謨記成化二十年十一月大升法王國師禪師以傳奉得官者三十有七人成化二十一年正月繼曉革去國師為民追奪其誥敕按名山藏典謨記云云成化二十三年九月僧繼曉發原籍為民四川番僧國師法王領占竹等悉降革職事并追奪纍次降敕印信儀仗發回四川原居光相寺居住按明通紀云云孝宗弘治三年八月詔毀黃村尼寺禮部尚書耿裕侍郎倪嶽周經皆正人力贊毀之按明大政紀云云弘治六年詔行取番僧領占竹以倪嶽柴升等至疏極論遂罷按名山藏典謨記弘治六年十月行取番僧領占竹來居大慈恩寺禮部尚書倪嶽等言領占竹被劾遣還復承召命騷驛傳啓幸門後難杜也上田母傳令自來禮科有給事中夏昂劾奏領占竹先因獻頂骨數珠骷體法碗叨冒升賞皇上登御革職遣還遠近稱快嶽所諫阻豈區區一傳哉願皇上嚴邪正治忽之防也上猶未允工科給事中柴升等上疏極論遂罷弘治八年王雲鳳等上疏禁給度牒按明大政紀弘治八年二月禮部祠祭郎中王雲鳳疏禁給度牒不報初尚書倪嶽因災異疏弊政用四事曰懲邪慝禁給度牒停減齋醮議處宗室言甚剴切後度僧不止乃獨疏列千餘言三上皆不報及旨下度僧不多人皆嘉其有回天之力弘治十二年以清寧宮成詔國師設壇慶讚按名山藏典謨記弘治十二年十月以清寧宮成命大能仁寺灌頂國師那卜堅參等設壇慶讚三日大學士劉健等言佛老異教宮庭禁地胡羯妄徒纍日連朝喧雜掖庭驚動寢廟廢祖宗之法重聖德之纍且以皇上至孝純誠保佑自天豈必假異術於宮禁然後可以上奉重慈祈永福壽哉臣平日尸素臨事乏規此等詔旨猝不與聞伏望速頒明詔撤壇斥僧臣不勝待罪俟命時科道官皆以為言上曰卿言是顧永樂朝亦有之既府部科道皆極言上曰有舊事姑胥後弘治十四年太監李興請建寺賜額隆禧升僧録司定錡右講經按名山藏典謨記弘治十四年五月太監李興請建寺大興縣東皋村以祝聖更乞賜額護敕以僧録司左覺義定錡住持得旨升定錡右講經額寺曰隆禧弘治十五年五月行取番僧國師領占竹於大慈恩寺禮部尚書張升諫不允按名山藏典謨記云云弘治十六年詔建壽塔既而罷之按明通紀弘治十六年詔建壽塔於朝陽門外既而罷之時大學士劉健等上言前代人主信佛莫如梁武帝卒餓死臺城本以求福反以致禍觀諸往事可為明鑒我祖宗相傳以治天下堯舜周孔之道而已浮屠異端蠧財惑衆何關於治欲造佛塔非所以訓天下垂後世也疏入有旨報罷武宗正德二年造新寺於內苑升慈恩能仁護國三寺禪師為國師按名山藏典謨記正德二年三月造新寺於內苑上習佛門焉因升大慈恩寺禪師領占竹為灌頂大國師大能仁寺禪師麻的寶哩塔西麻拶耶卜堅參大隆善護國寺禪師普肖藏卜為國師皆豫誥正德四年八月升大隆善護國寺國師普肖藏卜為法王剌麻羅竹班卓班丹端竹班卓羅竹朵而只堅參俱為左覺義按名山藏典謨記云云正德五年升諸僧為法王佛子及覺義都綱帝自命為大慶法王給僧度牒數萬以廣番教按名山藏典謨記正德五年四月升大能仁寺國師那小堅參禪師劄巴藏播為法王都綱那卜領占為佛子公葛端竹堅播札失為禪師大隆善護國寺剌毛綽即羅竹為佛子大慈恩寺國師乳如領占為西天佛子革職國師哈剌札為佛子剌麻也舍窩為禪師六月升大隆善寺禪師星吉班丹為國師左覺義羅竹班等為禪師剌麻癿竹為左覺義三作捨剌為右覺義倫竹堅參為都綱大慈恩寺佛子乳奴領占捨剌札俱為法王剌麻捨列星吉為佛子也夫短竹為禪師大能仁寺剌麼領占播為都綱上自命曰大慶法王因鑄大慶法王西天覺道圓明自在大定慧佛金印兼給誥令鐫印曰天一十月升國師羅竹班卓丹端竹為灌頂大國師禪師領占陸竹為國師給番僧度牒三萬漢僧道士各五千以廣番教正德六年番僧奏討田百頃為大慶法王下院按明通紀正德六年上方好佛自名大慶法王外廷無敢諫會番僧奏討田百頃為大慶法王下院傳圭因劾僧曰法王何為者至與尊號並列大不道當誅有詔不問其妄求亦止正德七年十一月大慈恩寺法王乞修造僧房許之工部諫不聽按名山藏典謨記云云正德八年為番僧修寺造塔賜大慶法王行童度牒聽具收度自便按明大政紀正德八年七月西僧欲奪甘州民田地遣官督建僧寺禮部尚書劉春執不可止之時關中飢春力爭以為不可大略謂非止病民邊警至不可支持必致擾害疏入幾兩月報下竟停之按名山藏典謨記正德八年四月大役軍士為番僧修大慈恩寺鬻爵贖罪以充費十月大慈恩寺灌頂大國師也舍窩死命造塔葬之工部及工科給事中執奏曰非故事上曰著為令十一月賜大慶法王領占班丹番行童度牒聽其收度自便正德九年正月吏部尚書楊一清上言不宜創梵字於西內時不能行按明通紀云云正德十年給大德法王國師誥命賜胡僧知三生法王金印袈裟按名山藏典謨記正德十年二月保安寺大德法王綽吉我些兒為其徒領占綽節兒綽供劄失請得為正副使還居烏斯藏比大乘法王例入貢并給與國師誥命得入番熬設廣茶下禮部尚書劉春議不可令覆議春執奏詔與誥命罷設茶敕是時上習番經被番僧服綽吉我些兒輩出入豹房參廁權貂及領占綽節兒等歸輜重相屬傳郵煩費焉五月大護國保安寺右覺義班丹倫竹為其師祖大善法王星吉班丹乞祭葬禮部執奏無故事特許之十一月嬖幸言西域胡僧有知三生者西人謂之活佛上使太監劉充往迎率指揮千戶百餘人甲士千人以珠琲為幡幢黃金為七供賜法王金印袈裟及其徒饋賜巨萬計敕以十年往返得便宜處置錢物益發官軍護送之正德十三年遣中官劉充迎活佛賜西域番僧食茶遣番僧封烏斯藏國西為闡教王按明大政紀正德十三年三月上遣中官劉充迎活佛使烏斯藏巡撫淮楊都御史叢蘭疏斥佛老無益乞還充勿遣不報時番國烏斯藏傳聞國西有童子記其生前事者以為活佛上遣使迎之所過誅求百計勢張甚蘭檄有司毋徇所欲至淮謁辭之南京兵部尚書喬字上疏諫遣使迎活佛甚傷國體字云國朝祖宗相承所以不絶番僧朝貢者不過羈縻遠夷而已非崇奉信惑之也陛下天縱聖明無微不燭抑豈不知西方之佛教無益中國之治乎不報按名山藏典謨記正德十三年五月賜西域番僧食茶八萬九千餘斤人許帶六千斤下番不為例七月遣番僧覺義領占劄巴等封烏斯藏國酋為闡教王劄巴等乞給馬快船三十載食鹽為入番買路資部科執奏詔特許之世宗嘉靖十四年興隆寺併慈恩寺一應修齋俱革按明會典嘉靖十四年大興隆寺令永不許復併大慈恩寺一應修齋俱革僧徒聽告就各寺依住有歸化者量給原寺田畝仍免差徭六年嘉靖十五年除禁中佛殿併毀佛像佛骨佛牙諸物按明大政紀嘉靖十五年五月帝欲除去禁中釋殿以其地奉建慈慶慈寧二宮命廷臣集議僉以為可帝即命撤之尋召李時夏言入視大善殿見金範佛像不下千百皆命銷毀其几案懸鍍金函藏貯尚多佛骨佛牙諸物言退上疏力請焚瘞帝從之於是禁中邪穢迸斥殆盡按春明夢餘録宗伯夏言議瘞佛骨疏比者恭遇皇上咨及群臣欲除去禁中釋殿奉建兩宮以備一代之制一時廷議仰贊皇上篤養盡制之孝闢邪崇正之化盛德大業光前振後矣今月十一日伏奉聖旨命大學士李時同臣言入看即所謂大善殿者臣等看得殿內有鑄金銀像巨細不下千百且多邪鬼淫褻之狀仰惟聖明燭其誕妄不經一旦奮然舉而除之甚盛舉也但臣見諸几案之上及懸度梁栱之間與夫金函之所藏貯者為物尚多不可識辨問之守者且云是為佛骨是為佛牙枯朽摧裂奇離磈礧計不下千斤臣惟佛法之入中國自漢明帝時始然不過人誦其書習其教而已至唐憲宗時乃迎佛骨至京師其臣韓愈極言其不祥不宜以入宮禁憲宗不能聽且深罪愈竟遠斥之臣意自後人莫敢矯其非凡番僧持以誑惑中國之人而名為佛顱佛骨者相屬於道由是流入天子宮禁之內歷世皆然不以為異今殿中所有未必非勝國所遺纍朝以來亦必以為彼法則然未嘗深究以延至今茲者恭惟皇上躬堯舜禹湯文武之資行堯舜禹湯文武之道始議毀佛屋毀除穢像使詭異之行不得瀆留清禁此真卓越千古之見出於尋常萬萬者也然殿宇像設既除所有前項佛頭佛牙之類皆屬污穢不宜使之尚存臣請乞以此物敕下所司瘞之草野一切掃而淨之以杜愚冥疑惑之端實為大聖人非常作為有補名教甚大功德罔極臣不勝幸甚後世幸甚疏入答曰大善殿所貯佛骨諸不經之物瘞之草野恐後日好事之人仍為啓視不如焚之以杜永患遂命禮部俱於城外焚之嘉靖十六年敕聽僧徒還俗禁修葺寺院及私自披剃為僧按明會典嘉靖十六年題準各該有司欽遵聖諭化正僧徒願自還俗者聽其自求安便各處寺院年久宮殿任其頺壞不許修葺民間幼童不許捨入為僧私自披剃如有此等罪其父母及其鄰佑嘉靖二十二年令大慈恩寺按明會典云云嘉靖四十二年十月罷遣番僧封諸藏著為令按名山藏典謨記云云嘉靖四十三年十二月詔番僧入貢者限人入邊如成化弘治故事按名山藏典謨記云云嘉靖四十五年詔禁僧尼戒壇按明會典凡禁止戒壇嘉靖四十五年令在外行撫按衙門督率有司各查本處僧寺若干僧徒若干明白登簿不時查點不到者罪坐住持立限投銷一切寄住遊僧發回原籍當差在京廠衛衙門及五城御史將京城內外地方大小僧寺嚴加巡緝有指稱受戒姦淫不法者訪拏重治按明通紀嘉靖四十五年九月詔順天府按官嚴禁僧尼戒壇説法仍令廠衛巡城御史通查勘京城內外僧寺如有仍前受戒寄寓者收捕下獄四方遊僧並聽所在有司遞回原籍當是時白蓮教盛行御史鮑承蔭以妖盜本為一途恐投邪鼓衆釀成大患遂令禁之神宗萬曆七年烏思藏僧鎖南堅錯求通貢按明通紀萬曆七年烏思藏僧鎖南堅錯求通貢堅錯者即闡化王答賴剌麻也故號稱活佛以傳經説法戒淫殺為虜所尊禮稱輪回轉法功德世界佛大國師萬曆五年套酋切近黃台吉約俺答迎堅錯西海上飲長生水俺答所從部落數十萬人徒以奉堅錯教無淫逞者其教化可知矣皇清天聰七年大清會典凡喇嘛禁例天聰七年定喇嘛班第出居城外清淨處所有請喇嘛念經治病者家主治罪又定喇嘛班第有容留婦女及不呈明禮部私為喇嘛蓋寺廟者治罪崇德五年大清會典崇德五年題準新收僧人納銀送戶部查收隨給用印度牒令僧綱司分發順治四年大清會典順治四年定喇嘛不許私自遊方有遊方到京者著發回原籍順治十一年大清會典順治十一年定禁止創建寺廟其修理頺壞寺廟聽從其便順治十八年大清會典順治十八年題準京城內白塔居住喇嘛九名西大達廟居住喇嘛八名及額木齊喇嘛應照舊留住外其餘喇嘛班第俱令於京城外居住如有壇邊京城居住者將喇嘛送刑部照違法例治罪康熙六年大清會典康熙六年議準凡喇嘛班第令該管大喇嘛逐日詳查禮部每月詳查有請念經治病者於大喇嘛處説明準去仍令交還大喇嘛康熙二十三年大清會典康熙二十三年覆準嗣後喇嘛所到處不過三日即令起程違者留住家長寺廟住持及失察官員俱行治罪喇嘛除犯死罪外所犯別罪停其入官仍照律治罪遞解原籍又定班第不許服用金黃色黃色吳巴什吳巴三察不許服用金黃色黃紅色如上賜者準用違者治罪
