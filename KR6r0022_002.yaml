body:
  text: 北齊北齊置昭元寺設大統諸員以掌佛教按隋書百官志後齊昭元寺掌諸佛教置大統一人統一人都維那三人亦置功曹主簿員以管諸州郡縣沙門曹顯祖天保二年詔稠禪師至鄴都建寺居之帝請受菩薩戒按北齊書顯祖本紀不載按佛祖統紀北齊文宜帝天保二年詔稠禪師至鄴都建雲門寺以居之師宴坐一室未嘗送迎帝至弟子勸之師曰賓頭盧迎王七步致王失國吾德雖不逮儀相似之所以不敢自欺冀致福於帝耳帝惑左右以師慢己欲躬加害師但出寺二十里拱立道旁帝怪問之師曰恐血汙伽藍耳帝即悔謝謂僕射楊遵彥曰如此真人何可謗耶遂同輦還宮問曰弟子前身何人師曰曾作羅剎王今猶好殺祝盆水使視之見羣剎在後帝大敬信請受菩薩戒永不食肉盡停五坊鷹犬傷生之具及境內屠殺天保十年帝如甘露寺禪居深觀按北齊書顯祖本紀天保十年春正月甲寅帝如遼陽甘露寺二月丙戌帝於甘露寺禪居深觀惟軍國大政奏聞世祖大寧二年夏五月壬午詔以城南雙堂閏位之苑回造大總持寺秋八月辛丑詔以三臺宮為大興聖寺按北齊書世祖本紀云云後主天統二年春三月乙巳太上皇帝詔以三臺施興聖寺按北齊書後主本紀云云天統三年太上皇詔悉蠲諸寺雜戶一準平人按北齊書後主本紀天統三年秋九月己酉太上皇帝詔諸寺署所綰雜保戶姓高者天保之初雖有優敕權假力用未免者今可悉蠲雜戶任屬郡縣一準平人天統五年春正月辛亥詔以金鳳等三臺未入寺者施大興聖寺夏四月甲子詔以并州尚書省為大基聖寺晉祠為大崇皇寺按北齊書後主本紀云云幼主承光元年鑿晉陽西山為大佛像又起大寶林寺按北齊書幼主本紀帝每災異寇盜水旱亦不貶損惟諸處設齋以此為修德嘗鑿晉陽西山為大佛像一夜然油萬盆光照宮內又為胡昭儀起大慈寺未成改為穆皇后大寶林寺窮極工巧運石填泉勞費億計人牛死者不可勝紀隋高祖開皇四年建興善寺居僧靈藏敕僕射參起居按隋書高祖本紀不載按佛祖統紀隋開皇四年靈藏律師始與帝為布衣交及即位建大興善寺以居之敕左右僕射每旦參問起居嘗陪駕洛州歸之者衆帝手敕曰弟子是俗人天子律師是道人天子有欲離俗者任師度之由是度人至數萬有疑之者帝曰律師化人為善朕禁人為惡意則一也仁壽元年夏六月頒舍利於諸州按隋書高祖本紀云云煬帝大業二年詔沙門致敬王者以僧明膽等不從而止按隋煬帝本紀不載按佛祖統紀大業二年詔沙門道士致敬王者沙門明膽等抗詔不從帝詰之對曰陛下若使準制罷道則不敢不奉如知大法可崇則法服之下僧無敬俗之典帝默然而止唐高祖武德七年傅奕上疏極詆佛法帝善之按唐書高祖本紀不載按傅奕傳高祖拜奕太史令武德七年上疏極詆浮圖法曰西域之法無君臣父子以三塗六道㬨愚欺庸追既往之罪窺將來之福至有身陷惡逆獄中禮佛口誦梵言以圖偷免且生死壽夭本諸自然刑德威福繫之人主今其徒矯托皆云由佛攘天理竊主權書曰惟辟作福惟辟作威惟辟玉食臣有作福作威玉食害于而家凶于而國五帝三王未有佛法君明臣忠年祚長久至漢明帝始立胡祠然惟西域桑門自傳其教西晉以上不許中國髠髮事胡至石苻亂華乃弛厥禁主庸臣侫政虐祚短事佛致然梁武齊襄尤足為戒昔褒姒一女營惑幽王能亡其國況今僧尼十萬刻繪泥像以惑天下有不亡乎陛下以十萬之衆自相夫婦十年滋産十年教訓兵農兩足利可勝既邪昔高齊章仇子他言僧尼塔廟外見毀宰臣內見嫉妃嬙陽讒隱謗卒死都市周武帝入齊封寵其墓臣竊賢之又上十二論言益痛切帝下奕議有司唯道源佐其請中書令蕭瑀曰佛聖人也非聖人者無法請誅之奕曰禮始事親終事君而佛逃父出家以匹夫抗天子以繼體悖所親瑀非出空桑乃尊其言蓋所謂非孝者無親瑀不答但合爪曰地獄正為是人設矣帝善奕對未及行會傳位止太宗即位常問奕卿拒佛法奈何奕曰佛西胡黠人爾欺夷狄以自神至入中國而孅兒幻夫摸象莊老以文飾之有害國家而無補百姓也帝異之太宗貞觀十六年幸弘福寺為穆太后追福按唐書太宗本紀不載按佛祖統紀貞觀十六年上幸弘福寺為穆太后追福自製疏稱皇帝菩薩戒弟子謂寺主道懿曰朕頃以老子是朕先宗故令居釋氏先卿等能無憾乎對曰陛下尊祖宗降成式詎敢有怨上曰佛老尊卑通人自鑑豈一時在上即以為勝朕宗自柱下故先老子凡有功德僉向釋門往日所在戰場皆立佛寺太原舊第亦以奉佛初未嘗創立道觀存心若此卿等應知貞觀十九年沙門元奘等自西域歸京師詔於弘福寺翻譯諸經按唐書太宗本紀不載按舊唐書方技傳僧元奘姓陳氏大業末出家博涉經論嘗謂翻譯者多有訛謬故就西域廣求異本以參驗之貞觀初隨商人往遊西域元奘既辨博出羣所在必為講釋論難番人遠近咸尊服之在西域十七年經百餘國悉解其國之語仍採其山川謠俗土地所有撰西域記十二卷貞觀十九年歸至京師太宗見之大悅與談論於是詔將梵本六百五十七部於弘福寺翻譯仍敕右僕射房元齡太子左庶子許敬宗廣召碩學沙門五十餘人相助整比貞觀二十二年敕有司寫元奘新譯佛經御製序文頒賜九道總管按唐書太宗本紀不載按佛祖統紀貞觀二十二年上幸坊州玉華宮召奘法師既至上曰朕在京苦熱故就此山泉石之涼憶見法師故遣相屈此日所翻何經奘曰近譯彌勒瑜伽師地論帝宣論親覽謂侍臣曰佛教廣大猶瞻天瞰海莫極高深九流典籍猶汀瀅方溟渤耳世言三教齊致者此妄談也因敕有司寫新譯經論頒賜九道總管御製大唐三藏聖教序以冠其首詔皇太子撰菩薩藏經後序上自是平章法義不輟於口敬侍法師親於家人高宗永徽二年九月癸巳廢玉華宮以為佛寺按唐書高宗本紀不載按舊唐書高宗本紀云云顯慶元年詔左僕射于志寧等潤色元奘所定之經御安福門觀元奘迎御製慈恩寺文詔皇子於奘師寺授歸戒按唐書高宗本紀不載按舊唐書高宗本紀元年夏四月戊申御安福門觀僧元奘迎御製拜書慈恩寺文導從以天竺法儀其徒甚盛按方技傳高宗東宮為文德太后追福造慈恩寺及翻經院內出大幡敕九部樂及京城諸寺幡蓋衆伎送元奘及所翻經像諸高僧等入住慈恩寺顯慶元年高宗又令左僕射于志寧侍中許敬宗中書令來濟李義府杜正倫黃門侍郎薛元超共潤色元奘所定之經國子博士范義頵太子洗馬郭瑜弘文館學士高若思等助加翻譯成七十五部上之後以京城人衆競來禮謁元奘乃奏請逐靜翻譯敕移於宣君山故玉華宮六年卒時年五十六歸葬於白鹿原士女送葬者數萬人按佛祖統紀元年十一月武皇后生皇子神光滿室賜名佛光王踰月詔於奘法師寺出家落髮授歸戒龍朔元年幸天宮寺度僧二十人按唐書高宗本紀不載按舊唐書高宗本紀龍朔元年九月幸天宮寺是高祖潛龍時舊宅上周歷殿宇感愴久之度僧二十人中宗嗣聖六年即太后永昌元年五月己巳白馬寺僧薛懷義為新平道行軍總管以繫突厥按唐書武后本紀云云嗣聖七年即太后天授元年頒大雲經於天下令諸州各置大雲寺按唐書武后本紀天授元年七月頒大雲經於天下按舊唐書武后本紀有沙門十人偽撰大雲經表上之盛言神皇受命之事制頒於天下令諸州各置大雲寺總度僧千人嗣聖十七年即太后久視元年斂天下僧錢為佛祠大像以張廷圭諫罷役按唐書武后本紀久視元年八月庚申斂天下僧錢作大像按張廷圭傳武后稅天下浮屠錢營佛祠於白司馬坂作大像廷圭諫以為傾四海之財殫萬民之力窮山之木為塔極冶之金為象然猶有為之法不足高也填塞澗穴覆壓蟲蟻且巨億計工員窮窶驅役為勞飢渴所致疾疹方作又僧尼乞丐自贍而州縣督輸星火迫切鬻賣以充非浮屠所謂隨喜者今天下虗竭蒼生雕弊謂宣先邊境實府庫養人力后善之召見長生殿賞慰良厚因是罷役景龍年盛興佛寺按唐書中宗本紀不載按辛替否傳景龍中盛興佛寺公私疲匱替否上疏曰今疆場危駭倉廩空虗卒輸不充士賞不及而大建寺宇廣造第宅伐木空山不給棟梁運土滿路不充牆壁所謂佛者清淨慈悲體道以濟物不欲利以損人不榮身以害教今三時之月掘山穿地損命也殫府虗帑損人也廣殿長廊榮身也損命則不慈悲損人則不愛物榮身則不清淨寧佛者之心乎昔夏為天子二十餘世而商受之商二十餘世而周受之周三十餘世而漢受之由漢而後歲代可知已咸有道之長無道之短豈窮金玉修塔廟享久長之祚乎臣以為減雕琢之費以賙不足是有佛之德息穿掘之苦以全昆蟲是有佛之仁罷營構之直以給邊垂是有湯武之功回不急之祿以購廉清是有唐虞之治陛下緩其所急急其所緩親未來疏見在失真實冀虗無重俗人之所為而輕天子之業臣竊痛之今出財依勢避役亡命類度為沙門其未度者窮民善人耳親樹知豈離朋黨畜妻養孥非無私愛是致人毀道非廣道求人也陛下常欲填池塹捐苑囿以賑貧人今天下之寺無數一寺當陛下一宮壯麗用度尚或過之十分天下之財而佛有七八陛下何有之矣雖役不食之人不衣之士猶尚不給況必待天生地養威動雨潤而後得之乎臣聞國無九年之儲曰非其國今計倉廩度府庫百僚共給萬事用度臣恐不能卒歲假如兵旱相乘則沙門不能擐甲胄寺塔不足禳飢饉矣帝不省睿宗先天元年西天沙門婆羅請然燈供佛帝臨觀燈輪按唐書睿宗本紀不載按佛祖統紀睿宗先天元年西天沙門婆羅請然燈供佛帝御延熹門臨觀燈輪高二十丈點金銀燈五百盞望之若華樹元宗開元二年詔檢責天下僧尼按唐書元宗本紀不載按姚崇傳元宗時崇封梁國公遷紫微令中宗時近戚奏度僧尼溫戶強丁因避賦役至是崇建言佛不在外悟之於心行事利益使蒼生安穩是謂佛理烏用姦人以汩真教帝善之詔天下汰僧偽濫髮而農者二萬餘人按舊唐書元宗本紀開元二年春正月丙寅紫微令姚崇上言請檢責天下僧尼以偽濫還俗者二萬餘人肅宗至德元載詔沙門諷頌祈福按唐書肅宗本紀不載按佛祖統紀肅宗至德元載帝在靈武以軍需不足宰相裴冕請鬻僧道度牒謂之香水錢時寇難方盛或勸帝宣憑佛祐詔沙門百人入行宮朝夕諷唄帝一夕夢沙門身金色誦寶勝如來以問左右或對曰賀蘭白草谷有新羅僧無漏常誦此名召見行在既而不空至遂并留之託以祈福上元二年皇后以帝不康刺血寫佛經百僚復於佛寺齋僧按唐書肅宗本紀不載按舊唐書肅宗本紀上元二年正月甲午上不康皇后張氏刺血寫佛經九月上不康百僚於佛寺齋僧年以南陽為國師按唐書肅宗本紀不載按學佛老訓唐肅宗志慕禪宗禮南陽為國師晨夕問道代宗永泰元年九月命百官觀浮圖像於光順門復敕於資聖西明二寺講仁王佛經閏十月斂民資作浮圖供按唐書代宗本紀永泰元年九月庚寅命百官觀浮圖像於光順門閏十月癸丑斂民資作浮圖供按王縉傳縉素奉佛不茹葷食肉晚節亢謹妻死以道政里第為佛祠諸道節度觀察使來朝必邀至其所諷令出財佐營作初代宗喜祠祀而未重浮屠法每從容問所以然縉與元載盛陳福業報應帝意向之由是禁中祀佛諷唄齋薰號內道場引內沙門日百餘饌供珍滋出入乘廄馬度支具廩給或夷狄入寇必合衆沙門誦護國仁王經為禳厭幸其去則橫加錫與不知紀極胡人官至卿監封