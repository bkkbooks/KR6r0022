祠部撿括天下寺及僧尼人數凡大寺四千六百蘭若四萬僧尼二十六萬五百秋七月庚子敕併省天下佛寺中書門下條疏聞奏據令式諸上州國忌日官吏行香於寺其上州望各留寺一所有列聖尊容便令移於寺內其下州寺並廢其上都東都兩街請留十寺寺僧十人敕曰上州各留寺工作精妙者留之如破落亦宣廢毀其合行香日官吏宣於道觀其上都下都每街留寺兩所寺留僧三十人上都左街留慈恩薦福右街留西明莊嚴中書又奏天下廢寺銅像鐘磬委鹽鐵使鑄錢其鐵像委本州鑄為農器金銀鍮石等像銷付度支衣冠士庶之家所有金銀銅鐵之像敕出後限一月納官如違委鹽鐵使依禁銅法處分其土木石等像合留寺內依舊又奏僧尼不合𨽻祠部請𨽻鴻臚寺其大秦穆護祆等祠釋教既已𨤲革邪法不可獨存其人並勒還俗遞歸本貫充稅戶如外國人送還本處收管八月制朕聞三代已前未嘗言佛漢魏之後像教寖興是由季時傳此異俗因緣染習蔓衍滋多以至於蠧耗國風而漸不覺誘惑人意而衆益迷泪於九州山原兩京城闕僧徒日廣佛寺日崇勞人力於土木之工奪人利於金寶之飾遣君親於師資之際違配偶於戒律之間壞法害人無逾此道且一夫不田有受其飢者一婦不蠶有受其寒者今天下僧尼不可勝數皆待農而食待蠶而衣寺宇招提莫知紀極皆雲構藻飾僭擬宮居晉宋齊梁物力凋瘵風俗澆詐莫不由是而致也況我高祖太宗以武定禍亂以文理華夏執此二柄是以經豈可以區區西方之教與我抗衡哉貞觀開元亦常𨤲革剗除不盡流衍轉滋朕博覽前言旁求輿議弊之可革斷在不疑而中外誠臣協豫至意條疏至當宜在必行懲千古之蠧源成百王之典法濟人利衆豫何讓焉其天下所折寺四千六百餘所還俗僧尼二十六萬五百人收充兩稅戶折招提蘭若四萬餘所收膏腴上田數千萬頃收奴婢為兩稅戶十五萬人𨽻僧尼屬主客顯明外國之教勒大秦穆護祓二千餘人還俗不雜中華之風於戲前古未行似將有待及今盡去豈謂無時驅遊惰不業之徒已踰十萬廢丹雘無用之室何啻億千自此清淨訓人慕無為之理簡易齊政成一俗之功將使六合黔黎同歸皇化尚以革弊之始日用不知下制明廷宣體豫意十一月甲辰敕悲田養病坊緣僧尼還俗無人主持恐殘疾無以取給兩京量給寺田賑濟諸州府七頃至十頃各於本管選耆壽一人勾當以充粥料會昌六年宣宗即位敕上都兩街舊留四寺外更添置八所按唐書宣宗本紀不載按舊唐書宣宗本紀會昌六年三月帝即位五月左右街功德使奏準今月五日赦書節文上都兩街舊留四寺外更添置八所兩所依舊名興福寺保壽寺六所請改舊名寶應寺改為資聖寺青龍寺改為護國寺菩提寺改為保唐寺清禪寺改為安國寺法雲尼寺改為唐安寺崇敬尼寺改為唐昌寺右街添置八所西明寺改為福壽寺莊嚴寺改為聖壽寺舊留寺二所舊名千福寺改為興元寺化度寺改為崇福寺永泰寺改為萬壽寺溫國寺改為崇聖寺經行寺改為龍興寺奉恩寺改為興福寺敕旨依奏誅道士劉元靖等十二人以其説惑武宗排毀釋氏故也宣宗大中元年閏三月大復佛寺按唐書宣宗本紀云云按舊唐書宣宗本紀大中元年閏三月敕會昌季年併省寺宇雖云異方之教無損致理之源中國之人久行其道𨤲革過當事體未弘其靈山勝境天下州府應會昌五年四月所廢寺宇有宿舊名僧復能修創一任住持所司不得禁止懿宗咸通年令沙門入禁中為禱祠事按唐書懿宗本紀不載按蕭倣傳倣咸通初為左散騎常侍懿宗怠政事喜佛道引桑門入禁中為禱祠事數幸佛廬廣施豫倣諫以為天竺法割愛取滅非帝王所尚慕今筆梵言口佛音不若懲謬賞濫罰振殃祈福況佛者可以悟取不可以相求帝雖昏縱猶嘉歎其言咸通五年裴坦以興佛寺上疏切諫優詔答之按唐書懿宗本紀不載按舊唐書懿宗本紀咸通五年春正月諫議大夫裴坦上疏論天下徵兵財賦方匱不宣過興佛寺以困國力優詔答之咸通十二年五月上幸安國寺賜講經僧沉香高座按唐書懿宗本紀不載按舊唐書懿宗本紀云云按杜陽雜編上敬天竺教十二年冬製二高座賜新安國寺一為講座一曰唱經座各高二丈砑沉檀為骨以漆塗之鏤金銀為龍鳳花木之形遍覆其上又置小方座前陳經案次設香盆四隅立金頴伽高三丈磴道欄檻無不悉具前繡錦襜褥精巧奇絶冠於一時即設萬人齋敕大德僧撤首為講論上創修安國寺臺殿廊宇制度宏麗就中三間華飾祕邃天下稱之為最工人以夜繼日而成之上親幸賞勞觀者如堵降誕日於宮中結綵為寺賜升朝官以下錦袍李可及嘗教數人作四方菩薩蠻隊咸通十四年三月迎佛骨於鳳翔按唐書懿宗本紀云云按舊唐書懿宗本紀咸通十四年三月庚午詔兩街僧於鳳翔法門寺迎佛骨四月八日佛骨至京自開遠門達安福門綵棚夾道念佛之音震地上登安福門迎禮之迎入內道場三日出於京城諸寺士女雲合威儀盛飾古無其比制曰朕以寡德纘承鴻業十有四年頃屬寇猖狂王師未息朕憂勤在位愛育生靈遂乃尊崇釋教至重元門迎請真身為萬姓祈福今觀覩之衆隘塞路岐載念狴牢寢興在慮嗟我黎人陷於刑辟況漸當暑毒繫於縲絏或積幽凝滯有傷和氣或關連追擾有妨農務京畿及天下州府縣禁囚徒除十惡忤逆故意殺人官典犯贓合造毒藥放火持杖開發墳墓外餘罪輕重節級遞減一等其京城軍鎮限兩日內疏理訖聞奏天下州府敕到三日內疏理聞奏按杜陽雜編十四年春詔大德僧數十輩於鳳翔法門寺迎佛骨百官上疏諫有言憲宗故事者上曰但生得見歿而無恨也遂以金銀為寶剎以珠玉為寶帳香舁仍用孔氄毛飾其寶剎小者高一丈大者二丈刻香檀為飛簾花檻瓦木階砌之類其上遍以金銀覆之舁一剎則用夫數百其寶帳香舁不可勝紀工巧輝煥與日爭麗又悉珊瑚瑪瑙珍珠瑟瑟綴為幡幢計用雜珍寶不啻百斛其剪綵為幡為傘約以萬隊四月八日佛骨入長安自開遠門安福樓夾道佛聲震地士女瞻禮僧徒道從上御安福寺親自頂禮泣下霑臆即召兩街供奉僧賜金帛各有差仍京師耆老元和迎真體者悉賜銀碗錦綵長安豪家競飾車服駕肩彌路四方挈老扶幼來觀者莫不疏素以待恩福時有軍卒斷左臂於佛前以手執之一步一禮血流灑地至肘行膝步齧指截髮不可算數又有僧以芟覆頂上謂之鍊頂火發痛作即掉其首呼叫坊市少年擒之不令動搖而痛不可忍乃號哭臥於道上頭頂焦爛舉止窘迫凡見者無不大哂焉上迎佛骨入內道場即設金花帳溫清牀龍鱗之席鳳毛之褥焚玉髓之香薦瓊膏之乳皆九年訶陵國所貢獻也初迎佛骨有詔令京城及畿甸於路傍壘土為香剎高或一二丈逮八九尺悉以金翠飾之京城之內約及萬數時妖言香剎搖動有佛光慶雲現路衢説者送相為異又坊市豪家相為無遮齋大會通衢間結綵為樓閣臺殿或水銀以為池金玉以為樹競聚僧徒廣設佛像吹螺擊鈸燈燭相繼又令小兒玉帶金額白腳呵唱於其間恣為嬉戲又結錦繡為小車輿以載歌舞如是充於輦轂之下而延壽里特為繁華之最是歲秋七月天子宴駕公主薨而上崩同昌之號明矣僖宗年詔歸佛骨於法門按唐書僖宗本紀不載按杜陽雜編僖宗皇帝即位詔歸佛骨於法門其道從威儀十無其一具體而已然京城耆耋士女爭為送別執手相謂曰六十年一度迎真身不知再見復在何時即伏首於前嗚咽流涕所在香剎詔悉鏟除近甸百無一二焉
